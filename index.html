        };

        function getEmptyQuoteSession() {

                cName: '', cPhone: '', taxGST: false, taxPST: false, notes: '', activeSubTab: 'customRing',
                customRing: { goldGrams: '', material: 'gold', goldKarat: 14, cRingSize: '', cBandWidth: '', cBandThickness: '', centerStone: { carats: '', shape: 'Round' }, fancyShape: 'Princess', fancySizeIdx: 0, fancyQty: '', melee: [{ size: '1.3', carat: 0.010, qty: '' }], customAddon: '' },

        const state = {

            scrapTransactions: [], 
            ringQuoteTransactions: [], 
            lastUpdated: 'Manual Input', syncStatus: 'Idle', isEditingNotes: false,
            scrapNotes: "• 24k gold bullion (coins/bars) is typically purchased at 95% (5% margin).\n• Treat all calculations as confidential store reference data.",
            quickCalcPurity: 'gold_14', quickCalcGrams: '',
            
            isSketching: false, quoteImage: null,
            settings: { meleePricePerCt: 2400, fancyPricePerCt: 700, goldPricesPerGram: { 10: 200, 14: 233, 18: 280, 19: 290, 22: 320 }, platinumPricePerGram: 380, silverPricePerGram: 100, centerStones: { tier1: {price:1300}, tier2: {price:1200}, tier3: {price:1000} }, rawCostRates: { melee: 300, fancy: 380, center: 400 } },
            quoteSession: getEmptyQuoteSession()
        };

        // --- SKETCHPAD ENGINE (PRO TRANSFORM) ---
        let sketchCtx; let isDrawing = false; let bgImageObj = null;
        let imgState = { x: 0, y: 0, scale: 1, rot: 0, width: 0, height: 0 };
        let sketchState = { tool: 'pen', color: '#1e293b', thickness: 3.0 }; 
        let transformMode = null; let transformStartX = 0, transformStartY = 0;
        let transformStartDist = 1; let transformStartAngle = 0; let transformCenterX = 0, transformCenterY = 0; let initialImgState = {};

        function openSketcher() {
            state.isSketching = true; render(); 
            setTimeout(() => {
                const canvas = document.getElementById('sketch-canvas'); const container = document.getElementById('sketch-container');
                if(!canvas || !container) return;
                canvas.width = container.clientWidth; canvas.height = container.clientHeight;
                sketchCtx = canvas.getContext('2d', { willReadFrequently: true }); sketchCtx.clearRect(0, 0, canvas.width, canvas.height); 
                
                if (state.quoteImage && !bgImageObj) {
                    const img = new Image();
                    img.onload = () => {
                        bgImageObj = img; imgState.width = img.width; imgState.height = img.height;
                        imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;
                        imgState.x = (canvas.width - (img.width * imgState.scale)) / 2;
                        imgState.y = (canvas.height - (img.height * imgState.scale)) / 2;
                        imgState.rot = 0; updateTransformBox();
                    };
                    img.src = state.quoteImage;
                } else if (bgImageObj) { updateTransformBox(); }
                
                setSketchTool('pen'); setSketchColor('#1e293b', 'slate'); setSketchThickness(3.0, 2);

                canvas.addEventListener('pointerdown', startDrawing); canvas.addEventListener('pointermove', draw);
                canvas.addEventListener('pointerup', stopDrawing); canvas.addEventListener('pointerout', stopDrawing);
                
                const tBox = document.getElementById('transform-box');
                if(tBox) { tBox.addEventListener('pointerdown', handleTransformStart); window.addEventListener('pointermove', handleTransformMove); window.addEventListener('pointerup', handleTransformEnd); }
            }, 50);
        }

        function handleSketchBgUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    bgImageObj = img; imgState.width = img.width; imgState.height = img.height;
                    const canvas = document.getElementById('sketch-canvas');
                    imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;
                    imgState.x = (canvas.width - (img.width * imgState.scale)) / 2;
                    imgState.y = (canvas.height - (img.height * imgState.scale)) / 2;
                    imgState.rot = 0; setSketchTool('transform'); updateTransformBox();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateTransformBox() {
            const tBox = document.getElementById('transform-box'); const imgEl = document.getElementById('sketch-bg');
            if (!tBox || !imgEl || !bgImageObj) return;
            const w = imgState.width * imgState.scale; const h = imgState.height * imgState.scale;

            imgEl.src = bgImageObj.src; imgEl.style.display = 'block';
            imgEl.style.width = imgState.width + 'px'; imgEl.style.height = imgState.height + 'px';
            imgEl.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale}) rotate(${imgState.rot}deg)`;
            imgEl.style.transformOrigin = "top left";

            tBox.style.width = w + 'px'; tBox.style.height = h + 'px';
            const cx = imgState.x + (w/2); const cy = imgState.y + (h/2);
            tBox.style.transform = `translate(${cx - w/2}px, ${cy - h/2}px) rotate(${imgState.rot}deg)`;
        }

        function handleTransformStart(e) {
            if (sketchState.tool !== 'transform') return;
            e.preventDefault(); transformStartX = e.clientX; transformStartY = e.clientY; initialImgState = { ...imgState };

            const tBox = document.getElementById('transform-box'); const rect = tBox.getBoundingClientRect();
            transformCenterX = rect.left + rect.width / 2; transformCenterY = rect.top + rect.height / 2;

            if (e.target.closest('#handle-scale')) {
                transformMode = 'scale'; const dx = e.clientX - transformCenterX; const dy = e.clientY - transformCenterY;
                transformStartDist = Math.sqrt(dx*dx + dy*dy) || 1;
            } else if (e.target.closest('#handle-rotate')) {
                transformMode = 'rotate'; transformStartAngle = Math.atan2(e.clientY - transformCenterY, e.clientX - transformCenterX);
            } else { transformMode = 'drag'; }
        }

        function handleTransformMove(e) {
            if (!transformMode) return; e.preventDefault();
            if (transformMode === 'drag') {
                const dx = e.clientX - transformStartX; const dy = e.clientY - transformStartY;
                imgState.x = initialImgState.x + dx; imgState.y = initialImgState.y + dy;
            } else if (transformMode === 'scale') {
                const dx = e.clientX - transformCenterX; const dy = e.clientY - transformCenterY;
                const currentDist = Math.sqrt(dx*dx + dy*dy);
                imgState.scale = Math.max(0.1, initialImgState.scale * (currentDist / transformStartDist));
            } else if (transformMode === 'rotate') {
                const currentAngle = Math.atan2(e.clientY - transformCenterY, e.clientX - transformCenterX);
                imgState.rot = initialImgState.rot + ((currentAngle - transformStartAngle) * (180 / Math.PI));
            }
            updateTransformBox();
        }

        function handleTransformEnd() { transformMode = null; }

        function setSketchTool(tool) {
            sketchState.tool = tool;
            ['pen', 'highlighter', 'eraser', 'transform'].forEach(t => { const el = document.getElementById('tool-' + t); if (el) { el.classList.remove('border-brand-gold', 'bg-brand-gold/10', 'text-brand-gold'); el.classList.add('border-transparent', 'text-brand-500'); } });
            const selected = document.getElementById('tool-' + tool);
            if (selected) { selected.classList.remove('border-transparent', 'text-brand-500'); selected.classList.add('border-brand-gold', 'bg-brand-gold/10', 'text-brand-gold'); }
            
            const canvas = document.getElementById('sketch-canvas'); const tBox = document.getElementById('transform-box');
            if(canvas && tBox) {
                if(tool === 'transform') { canvas.style.pointerEvents = 'none'; if(bgImageObj) tBox.style.display = 'block'; } 
                else { canvas.style.pointerEvents = 'auto'; tBox.style.display = 'none'; }
            }
            if(sketchCtx) {
                sketchCtx.lineCap = 'round'; sketchCtx.lineJoin = 'round';
                if (tool === 'eraser') { sketchCtx.globalCompositeOperation = 'destination-out'; sketchCtx.lineWidth = sketchState.thickness * 6; sketchCtx.globalAlpha = 1.0; } 
                else { sketchCtx.globalCompositeOperation = 'source-over'; sketchCtx.strokeStyle = sketchState.color; sketchCtx.lineWidth = tool === 'highlighter' ? sketchState.thickness * 4 : sketchState.thickness; sketchCtx.globalAlpha = tool === 'highlighter' ? 0.3 : 1.0; }
            }
        }

        function setSketchColor(color, id) {
            sketchState.color = color; if (sketchState.tool === 'eraser' || sketchState.tool === 'transform') setSketchTool('pen'); 
            ['slate', 'gold', 'red', 'green', 'yellow'].forEach(c => { const el = document.getElementById('color-' + c); if(el) { el.classList.remove('border-brand-400', 'scale-110'); el.classList.add('border-transparent', 'scale-100'); } });
            const selected = document.getElementById('color-' + id); if(selected) { selected.classList.remove('border-transparent', 'scale-100'); selected.classList.add('border-brand-400', 'scale-110'); }
            setSketchTool('pen');
        }

        function setSketchThickness(thickness, num) {
            sketchState.thickness = thickness;
            [1, 2, 3].forEach(n => { const el = document.getElementById('thick-' + n); if(el) { el.classList.remove('bg-brand-gold', 'shadow-md'); el.classList.add('bg-brand-300'); } });
            const selected = document.getElementById('thick-' + num); if(selected) { selected.classList.remove('bg-brand-300'); selected.classList.add('bg-brand-gold', 'shadow-md'); }
            setSketchTool(sketchState.tool);
        }

        function startDrawing(e) { isDrawing = true; draw(e); }
        function draw(e) {
            e.preventDefault(); if (!isDrawing) return;
            const canvas = document.getElementById('sketch-canvas'); const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width); const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            sketchCtx.lineTo(x, y); sketchCtx.stroke(); sketchCtx.beginPath(); sketchCtx.moveTo(x, y);
        }
        function stopDrawing() { isDrawing = false; if(sketchCtx) sketchCtx.beginPath(); }

        function clearSketch() {
            const canvas = document.getElementById('sketch-canvas'); sketchCtx.clearRect(0, 0, canvas.width, canvas.height);
            bgImageObj = null; state.quoteImage = null;
            document.getElementById('sketch-bg').style.display = 'none'; document.getElementById('transform-box').style.display = 'none'; setSketchTool('pen');
        }

        function saveSketch() {
            const canvas = document.getElementById('sketch-canvas'); const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width; exportCanvas.height = canvas.height; const ctx = exportCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            
            if (bgImageObj) {
                ctx.save();
                const cx = imgState.x + (imgState.width * imgState.scale) / 2; const cy = imgState.y + (imgState.height * imgState.scale) / 2;
                ctx.translate(cx, cy); ctx.rotate(imgState.rot * Math.PI / 180); ctx.translate(-cx, -cy);
                ctx.drawImage(bgImageObj, imgState.x, imgState.y, imgState.width * imgState.scale, imgState.height * imgState.scale);
                ctx.restore();
            }
            
            ctx.drawImage(canvas, 0, 0); state.quoteImage = exportCanvas.toDataURL('image/jpeg', 0.8); state.isSketching = false; render();
        }

        function closeSketcher() { state.isSketching = false; render(); }

        // --- AUTO-HEALING INITIALIZATION & DATA SYNC ---
        function loadStorageData() {
            try {
                const st = safeJSONParse('gr_scrap_ledger', []); 
                state.scrapTransactions = Array.isArray(st) ? st.filter(item => item && typeof item === 'object') : [];
                
                const qt = safeJSONParse('gr_quote_ledger', []); 
                state.ringQuoteTransactions = Array.isArray(qt) ? qt.filter(item => item && typeof item === 'object') : [];

                const lsSettings = safeJSONParse('gr_master_settings', null);
                if (lsSettings && typeof lsSettings === 'object') {
                    state.settings.meleePricePerCt = Number(lsSettings.meleePricePerCt) || 2400;
                    state.settings.fancyPricePerCt = Number(lsSettings.fancyPricePerCt) || 700;
                    state.settings.goldPricesPerGram = lsSettings.goldPricesPerGram || { 10: 200, 14: 233, 18: 280, 19: 290, 22: 320 };

        function handleImageUpload(event, targetStateKey) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    if (targetStateKey === 'scrap') state.scrapImage = canvas.toDataURL('image/jpeg', 0.6);
                    else if (targetStateKey === 'quote') { state.quoteImage = canvas.toDataURL('image/jpeg', 0.6); bgImageObj = null; }

                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function fetchLivePrices() {
            if (GOLD_API_KEY.includes('INSERT')) return alert("Please map your live GoldAPI token key profile inside the source parameters.");
            state.syncStatus = 'Fetching...'; updateSpotUI(); 
            try {
                const headers = { 'x-access-token': GOLD_API_KEY, 'Content-Type': 'application/json' };
                const responses = await Promise.all(['XAU', 'XAG', 'XPT'].map(m => fetch(`https://www.goldapi.io/api/${m}/CAD`, { headers }).then(res => res.json())));
                state.spotPrices.gold = responses[0].price; state.spotPrices.silver = responses[1].price; state.spotPrices.platinum = responses[2].price;
                state.lastUpdated = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); state.syncStatus = 'Synced';
                if(state.activeTab === 'calculator') updateScrapUI(); if(state.activeTab === 'spot_price') updateSpotUI();
            } catch (error) { state.syncStatus = 'Failed'; if(state.activeTab === 'spot_price') updateSpotUI(); alert("Network error: " + error.message); }
        }

        // --- SCRAP LOGIC ---
        function calculateScrapTotal() {
            let gross = state.scrapItems.reduce((total, item) => {
                const w = Number(item.weight) || 0; const r = Number(item.rate) || 0; if (!w) return total;
                const spot = (state.spotPrices[item.material] || 0) / TROY_ONCE_GRAMS;
                const purityFactor = item.material === 'gold' ? item.purity / 24 : item.purity;
                return total + (w * purityFactor * spot * (r / 100));
            }, 0);
            let deduction = (Number(state.stoneRemovalQty) || 0) * 5;
            return Math.max(0, gross - deduction);
        }

        function updateScrapUI() {
            state.scrapItems.forEach((item, idx) => {
                const w = Number(item.weight) || 0; const r = Number(item.rate) || 0;
                const spot = (state.spotPrices[item.material] || 0) / TROY_ONCE_GRAMS;
                const purityFactor = item.material === 'gold' ? item.purity / 24 : item.purity;
                const rowTotal = w * purityFactor * spot * (r / 100);
                const el = document.getElementById(`scrap-row-total-${idx}`); if (el) el.innerText = '$' + rowTotal.toFixed(2);
            });
            const grandEl = document.getElementById('scrap-grand-total'); if (grandEl) grandEl.innerText = '$' + calculateScrapTotal().toFixed(2);
        }
        function updateScrapMaterial(idx, material) { state.scrapItems[idx].material = material; state.scrapItems[idx].purity = material === 'gold' ? 14 : (material === 'silver' ? 0.925 : 0.950); state.scrapItems[idx].rate = material === 'gold' ? 85 : 70; render(); }
        function addScrapItem() { state.scrapItems.push({ weight: '', material: 'gold', purity: 14, rate: 85 }); render(); }
        function removeScrapItem(idx) { state.scrapItems.splice(idx, 1); render(); updateScrapUI(); }

        function saveScrapTransaction() {
            if (!state.customerName || state.scrapItems.every(i => !i.weight)) return alert("Complete the client identity data and map at least one item.");
            const total = calculateScrapTotal();
            const deductionLog = Number(state.stoneRemovalQty) > 0 ? ` [Stones Removed: ${state.stoneRemovalQty} (-$${state.stoneRemovalQty * 5})]` : '';
            const log = state.scrapItems.filter(i => i.weight).map(i => `${i.weight}g ${i.material} (${i.material==='gold'?i.purity+'k':i.purity})`).join(', ') + deductionLog;
            
            state.scrapTransactions.unshift({ date: new Date().toLocaleString(), name: state.customerName, phone: state.phoneNumber, summary: log, total: total.toFixed(2), image: state.scrapImage, deduction: (Number(state.stoneRemovalQty) || 0) * 5 });
            try {
                localStorage.setItem('gr_scrap_ledger', JSON.stringify(state.scrapTransactions));
                state.customerName = ''; state.phoneNumber = ''; state.address = ''; state.driversLicense = ''; state.stoneRemovalQty = ''; state.scrapImage = null; state.scrapItems = [{ weight: '', material: 'gold', purity: 14, rate: 85 }];
                render(); alert("Scrap payout logged successfully.");
            } catch (e) { alert("Storage limit reached! Please clear some old history to save new entries."); state.scrapTransactions.shift(); }
        }

        // --- SPOT PRICE LOGIC ---
        function calculateQuickRawCost() {
            const grams = Number(state.quickCalcGrams) || 0; if (!grams) return "0.00";
            const [metal, spec] = state.quickCalcPurity.split('_');
            const spot = (state.spotPrices[metal] || 0) / TROY_ONCE_GRAMS;
            let factor = 1; if (metal === 'gold') factor = Number(spec) / 24; else if (metal === 'silver' || metal === 'platinum') factor = Number(spec) / 1000;
            return (grams * spot * factor).toFixed(2);
        }

        function updateSpotUI() {
            const bg = state.spotPrices.gold / TROY_ONCE_GRAMS; const bs = state.spotPrices.silver / TROY_ONCE_GRAMS; const bp = state.spotPrices.platinum / TROY_ONCE_GRAMS;
            const gMatrix = document.getElementById('spot-gold-matrix'); if(gMatrix) gMatrix.innerHTML = Array.from({length: 15}, (_, i) => i + 10).map(k => `<div class="flex justify-between border-b border-brand-200 pb-1.5"><span class="font-semibold text-brand-600">${k}k Solid</span><span class="font-mono text-brand-800 font-bold">$${(bg * (k / 24)).toFixed(2)}/g</span></div>`).join('');

            const pMatrix = document.getElementById('spot-plat-matrix'); if(pMatrix) pMatrix.innerHTML = [0.999, 0.950, 0.900, 0.850].map(p => `<div class="flex justify-between border-b border-brand-200 pb-1.5"><span class="font-semibold text-brand-600">${p === 0.999 ? 'Fine Pure (.999)' : 'Alloy Assay ' + p}</span><span class="font-mono text-brand-800 font-bold">$${(bp * p).toFixed(2)}/g</span></div>`).join('');
            const qTotal = document.getElementById('spot-quick-total'); if(qTotal) qTotal.innerText = '$' + calculateQuickRawCost();
        }

        // --- BRIDAL STACK QUOTE ENGINE ---
        function hasRingData(type, dataSource) {
            const r = dataSource ? dataSource[type] : state.quoteSession[type]; if(!r) return false;
            const grams = Number(r.goldGrams) || 0; 
            const center = type==='customRing' ? (Number(r.centerStone?.carats) || 0) : 0;
            const fancy = Number(r.fancyQty) || 0; 
            const melee = (r.melee || []).reduce((sum, m) => sum + (Number(m?.qty) || 0), 0);
            const addon = Number(r.customAddon) || 0;
            return (grams > 0 || center > 0 || fancy > 0 || melee > 0 || addon > 0);
        }

        function updateMeleeSize(type, idx, val) { 
            state.quoteSession[type].melee[idx].size = val; 
            state.quoteSession[type].melee[idx].carat = ROUND_MELEE[val]; 
            const el = document.getElementById(`melee-carat-${type}-${idx}`);
            if(el) el.innerText = ROUND_MELEE[val].toFixed(3);
            updateQuoteTotals(); 
        }
        function updateMeleeQty(type, idx, val) { state.quoteSession[type].melee[idx].qty = val; updateQuoteTotals(); }
        function addMeleeRow(type) { state.quoteSession[type].melee.push({ size: '1.3', carat: ROUND_MELEE['1.3'], qty: '' }); render(); }
        function removeMeleeRow(type, idx) { state.quoteSession[type].melee.splice(idx, 1); render(); setTimeout(updateQuoteTotals, 0); }

        function calculateSpecificRingCost(type) {
            const r = state.quoteSession[type]; if(!r) return 0;
            let totalMeleeCts = 0; (r.melee || []).forEach(m => { if(m) totalMeleeCts += (Number(m.qty) || 0) * m.carat; });
            const standardRetailMeleeCost = totalMeleeCts * (state.settings.meleePricePerCt || 2400);

            const shapeArr = FANCY_SHAPES[r.fancyShape] || FANCY_SHAPES['Princess'];
            const fancyShapeData = shapeArr[r.fancySizeIdx] || shapeArr[0];
            const retailFancyCost = (Number(r.fancyQty) || 0) * fancyShapeData.carat * (state.settings.fancyPricePerCt || 700);

            const grams = Number(r.goldGrams) || 0; let retailMaterialCost = 0;
            if (r.material === 'gold') retailMaterialCost = grams * ((state.settings.goldPricesPerGram || {})[r.goldKarat] || 0);
            else if (r.material === 'platinum') retailMaterialCost = grams * (state.settings.platinumPricePerGram || 0);
            else if (r.material === 'silver') retailMaterialCost = grams * (state.settings.silverPricePerGram || 0);

            let retailCenterCost = 0;
            if (type === 'customRing') {
                const centerCarats = Number(r.centerStone?.carats) || 0;
                let centerMultiplier = state.settings.rawCostRates?.center || 400; 
                if (centerCarats > 0 && centerCarats < 2.0) centerMultiplier = state.settings.centerStones?.tier1?.price || 1300; 
                else if (centerCarats >= 2.0 && centerCarats < 3.0) centerMultiplier = state.settings.centerStones?.tier2?.price || 1200;
                else if (centerCarats >= 3.0) centerMultiplier = state.settings.centerStones?.tier3?.price || 1000;
                retailCenterCost = centerCarats * centerMultiplier;
            }
            return standardRetailMeleeCost + retailFancyCost + retailMaterialCost + retailCenterCost + (Number(r.customAddon) || 0);
        }

        function updateQuoteTotals() {
            if(!state.quoteSession) return;
            let grandTotal = 0;

            const mb = state.quoteSession.mensBand || {};
            const mbSz = Number(mb.mbSize) || 0; const mbW = Number(mb.mbWidth) || 0; const mbT = Number(mb.mbThickness) || 0;
            if (mbSz && mbW && mbT) {
                const diameter = 11.63 + (0.8128 * mbSz);
                const vol_cm3 = (mbW * mbT * Math.PI * (diameter + mbT)) / 1000;
                let density = 13.1;
                if (mb.material === 'gold') density = DENSITIES.gold[mb.goldKarat] || 13.1;
                else if (mb.material === 'platinum') density = DENSITIES.platinum;
                else if (mb.material === 'silver') density = DENSITIES.silver;
                mb.goldGrams = (vol_cm3 * density).toFixed(2);
            } else if (mb.goldGrams !== undefined) { mb.goldGrams = ''; }

            const mbWeightDisplay = document.getElementById('mb-calculated-weight');
            if (mbWeightDisplay) mbWeightDisplay.innerText = mb.goldGrams ? mb.goldGrams + 'g' : '0.00g';

            ['customRing', 'weddingBand', 'mensBand'].forEach(type => {
                let r = state.quoteSession[type]; if(!r) return;
                let totalMeleeCts = 0;
                
                (r.melee || []).forEach((m, idx) => {
                    if(!m) return;
                    const c = (Number(m.qty) || 0) * m.carat; totalMeleeCts += c;
                    const el = document.getElementById(`quote-melee-row-${type}-${idx}`); if (el) el.innerText = c.toFixed(3);
                });

                const shapeArr = FANCY_SHAPES[r.fancyShape] || FANCY_SHAPES['Princess'];
                const fancyCts = (Number(r.fancyQty) || 0) * (shapeArr[r.fancySizeIdx] || shapeArr[0]).carat;
                
                const elFancySub = document.getElementById(`quote-fancy-row-total-${type}`); if (elFancySub) elFancySub.innerText = fancyCts.toFixed(3);
                const elMeleeCts = document.getElementById(`quote-total-melee-cts-${type}`); if (elMeleeCts) elMeleeCts.innerText = (totalMeleeCts + fancyCts).toFixed(3);

                const ringCost = calculateSpecificRingCost(type);
                const elRingTotal = document.getElementById(`quote-ring-total-${type}`); if (elRingTotal) elRingTotal.innerText = `$${ringCost.toFixed(2)}`;

                if (hasRingData(type)) grandTotal += ringCost;
            });

            let taxMultiplier = 1.0;
            if (state.quoteSession.taxGST) taxMultiplier += 0.05;
            if (state.quoteSession.taxPST) taxMultiplier += 0.07;
            let finalAmount = grandTotal * taxMultiplier;

            const elFinalTotal = document.getElementById('quote-final-total'); if (elFinalTotal) elFinalTotal.innerText = `$${finalAmount.toFixed(2)}`;
            const elSummaryGrand = document.getElementById('summary-grand-total'); if (elSummaryGrand) elSummaryGrand.innerText = `$${finalAmount.toFixed(2)}`;
        }

        // --- DATA EXPORT & CLEARANCE MODULE ---
        function exportCSV(type) {
            let csv = "";
            if (type === 'scrap') {
                csv = "Date,Client,Phone,Summary,Total\n";
                (state.scrapTransactions || []).forEach(t => { if(t) csv += `"${t.date || ''}","${t.name || ''}","${t.phone || ''}","${(t.summary||'').replace(/"/g, '""')}","${t.total || 0}"\n`; });
            } else {
                csv = "Date,Client,Phone,Type,Metal Base,Centerstone,Final Price\n";
                (state.ringQuoteTransactions || []).forEach(q => {
                    if(!q) return;
                    const d = q.fullData || {}; let baseStr = ''; let centerStr = 'N/A';
                    if (d.customRing || d.weddingBand || d.mensBand) { 
                        const bR = hasRingData('customRing', d) ? `Eng: ${d.customRing.goldGrams}g ${d.customRing.material}` : '';
                        const bW = hasRingData('weddingBand', d) ? `Wed: ${d.weddingBand.goldGrams}g ${d.weddingBand.material}` : '';
                        const bM = hasRingData('mensBand', d) ? `Men: Sz ${d.mensBand.mbSize} | ${d.mensBand.goldGrams}g ${d.mensBand.material}` : '';
                        baseStr = [bR, bW, bM].filter(Boolean).join(' | ');
                        centerStr = hasRingData('customRing', d) ? `${d.customRing.centerStone?.carats || 0}ct ${d.customRing.centerStone?.shape || 'Round'}` : 'N/A';
                    } else { 
                        baseStr = d.type === 'mens_band' ? `Band Sz ${d.mbSize} | ${d.goldGrams}g ${d.material}` : `${d.goldGrams}g ${d.material}`;
                        centerStr = d.type === 'mens_band' ? 'N/A' : `${d.centerStone?.carats || 0}ct ${d.centerStone?.shape || 'Round'}`;
                    }
                    csv += `"${q.date || ''}","${q.name || ''}","${q.phone || ''}","Multi-Ring Stack","${baseStr}","${centerStr}","${q.total || 0}"\n`;
                });
            }
            const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${type}_Ledger_Export_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function clearHistory() {
            const range = document.getElementById('clear-history-range').value;
            const startDateEl = document.getElementById('clear-start-date').value; const endDateEl = document.getElementById('clear-end-date').value;
            if (!confirm("WARNING: Are you sure you want to delete ledger history? Ensure you have exported a backup first!")) return;

            let filteredScrap = []; let filteredQuotes = [];
            const scrapSafe = Array.isArray(state.scrapTransactions) ? state.scrapTransactions : [];
            const quoteSafe = Array.isArray(state.ringQuoteTransactions) ? state.ringQuoteTransactions : [];

            if (range === 'all') { filteredScrap = []; filteredQuotes = []; } 
            else if (range === '365') {
                const cutoffDate = new Date(); cutoffDate.setDate(cutoffDate.getDate() - 365);
                filteredScrap = scrapSafe.filter(t => t && new Date(t.date) > cutoffDate);
                filteredQuotes = quoteSafe.filter(t => t && new Date(t.date) > cutoffDate);
            } else if (range === 'custom') {
                if (!startDateEl || !endDateEl) return alert("Please select both a start and end date for the custom range.");
                const start = new Date(startDateEl); start.setHours(0,0,0,0);
                const end = new Date(endDateEl); end.setHours(23,59,59,999);
                if (start > end) return alert("Start date must be before end date.");
                filteredScrap = scrapSafe.filter(t => { if(!t) return false; const tDate = new Date(t.date); return tDate < start || tDate > end; });
                filteredQuotes = quoteSafe.filter(t => { if(!t) return false; const tDate = new Date(t.date); return tDate < start || tDate > end; });
            }

            const scrapDeleted = scrapSafe.length - filteredScrap.length;
            const quotesDeleted = quoteSafe.length - filteredQuotes.length;
            state.scrapTransactions = filteredScrap; state.ringQuoteTransactions = filteredQuotes;
            localStorage.setItem('gr_scrap_ledger', JSON.stringify(state.scrapTransactions)); localStorage.setItem('gr_quote_ledger', JSON.stringify(state.ringQuoteTransactions));
            render(); alert(`Success! Deleted ${scrapDeleted} Scrap records and ${quotesDeleted} Quote records.`);
        }

                    let meleeSummary = (r.melee || []).filter(m => m && Number(m.qty) > 0).map(m => `${m.qty}x (${m.size}mm)`).join(', ') || "None";
                    
                    htmlStr += `
                        <div class="border-t border-brand-200 pt-4 mt-4">
                            <h3 class="font-serif italic font-bold text-lg text-brand-800 mb-2">${title}</h3>
                            <div class="grid grid-cols-2 gap-y-2 text-xs">
                                <p><strong class="text-brand-900">Metal:</strong> ${r.goldGrams}g ${r.material} (${r.material==='gold'?r.goldKarat+'k':'Solid'})</p>
                                ${type === 'mensBand' && r.mbSize ? `<p><strong class="text-brand-900">Specs:</strong> Sz ${r.mbSize} (${r.mbWidth}x${r.mbThickness}mm)</p>` : ''}
                                ${type !== 'mensBand' && r.cRingSize ? `<p><strong class="text-brand-900">Specs:</strong> Sz ${r.cRingSize} (${r.cBandWidth}x${r.cBandThickness}mm)</p>` : ''}
                                ${type === 'customRing' && r.centerStone?.carats ? `<p><strong class="text-brand-900">Centerstone:</strong> ${r.centerStone.carats}ct ${r.centerStone.shape}</p>` : ''}
                                <p><strong class="text-brand-900">Fancy Accent:</strong> ${r.fancyQty || 0}x ${r.fancyShape}</p>
                                <p class="col-span-2"><strong class="text-brand-900">Melee Layout:</strong> ${meleeSummary}</p>
                            </div>
                        </div>
                    `;
                }
            });

            let taxArray = []; if (d.taxGST) taxArray.push("GST (5%)"); if (d.taxPST) taxArray.push("PST (7%)");
            const taxStr = taxArray.length > 0 ? taxArray.join(" + ") : "Exempt";

            htmlStr += `
                        ${d.notes ? `<div class="bg-brand-50 p-4 rounded-xl border border-brand-200 text-brand-800 text-xs italic mt-4"><strong class="not-italic text-brand-900 block mb-1">Global Notes:</strong> ${d.notes}</div>` : ''}
                        
                        <div class="mt-6 pt-5 border-t-2 border-brand-800 flex justify-between items-end">
                            <div><p class="text-[10px] text-brand-500 uppercase tracking-widest font-bold mb-1">Tax Application</p><p class="text-xs font-bold">${taxStr}</p></div>
                            <div class="text-right"><p class="text-[10px] text-brand-500 uppercase tracking-widest font-bold mb-1">Estimated Final Price</p><p class="text-3xl font-black text-brand-900">${q.total}</p></div>
                        </div>
                        
                        ${q.image ? `<div class="mt-6"><p class="mb-2 text-[10px] font-bold text-brand-500 uppercase tracking-wider">Design Reference:</p><img src="${q.image}" class="w-full max-w-[250px] rounded-xl border border-brand-200 shadow-sm" /></div>` : ''}
                        
                        <div class="mt-8 pt-4 border-t border-brand-200">
                            <p class="text-[9px] text-brand-400 italic text-justify leading-relaxed">* Note: This is an estimated consultation quote. Due to daily fluctuations in the global spot price of precious metals and variations in the final cast weight of raw materials, prices are subject to final adjustment and review prior to manufacturing.</p>
                        </div>
                    </div>
                </div>
                <div id="print-button" class="mt-8 flex flex-col sm:flex-row gap-3">
                    <button onclick="loadQuoteIntoEditor(${idx})" class="flex-1 bg-brand-100 text-brand-800 py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm hover:bg-brand-200 transition-colors">Load Editor</button>
                    <button onclick="window.print()" class="flex-1 bg-brand-800 text-brand-gold py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-md hover:bg-brand-900 transition-colors">Print Handout</button>
                    <button onclick="document.getElementById('modal-backdrop').classList.add('hidden')" class="flex-1 bg-white border border-brand-200 text-brand-600 py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-brand-50 transition-colors">Close</button>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = htmlStr;
            document.getElementById('modal-backdrop').classList.remove('hidden');
        }

        function loadQuoteIntoEditor(idx) {
            const q = state.ringQuoteTransactions[idx]; 
            if (!q) return;
            let d = q.fullData ? JSON.parse(JSON.stringify(q.fullData)) : getEmptyQuoteSession();
            
            if (!d.customRing && !d.weddingBand && !d.mensBand) {
                const legacy = d; d = getEmptyQuoteSession();
                if (legacy.type === 'mens_band') { d.mensBand = { ...d.mensBand, ...legacy }; d.activeSubTab = 'mensBand'; }
                else { d.customRing = { ...d.customRing, ...legacy }; d.activeSubTab = 'customRing'; }
                d.cName = legacy.cName || ''; d.cPhone = legacy.cPhone || ''; d.notes = legacy.notes || '';
                d.taxGST = legacy.taxGST || false; d.taxPST = legacy.taxPST || false;
            }
            
            state.quoteSession = d;
            state.quoteImage = q.image || null; bgImageObj = null; 
            state.activeTab = 'quote'; document.getElementById('modal-backdrop').classList.add('hidden');
            render();
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="text-center mb-8 pt-6">
                    <h1 class="font-serif text-5xl italic text-brand-900 tracking-wide drop-shadow-sm">Gold and Rose</h1>
                    <p class="text-[10px] text-brand-400 uppercase tracking-[0.3em] font-bold mt-3">Executive Operations Dashboard</p>
                </div>
                ${buildTabsHTML()}
                ${state.activeTab === 'calculator' ? buildScrapHTML() : ''}
                ${state.activeTab === 'quote' ? buildQuoteTab() : ''}
                ${state.activeTab === 'spot_price' ? buildSpotHTML() : ''}
                ${state.activeTab === 'settings' ? buildSettingsHTML() : ''}
                ${state.activeTab === 'ledger' ? buildLedgerHTML() : ''}
                ${state.activeTab === 'baby_rings' ? buildBabyRingsHTML() : ''}
                <div id="modal-backdrop" class="fixed inset-0 bg-brand-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
                    <div id="modal-content" class="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh] border border-brand-100"></div>
                </div>
            `;
            if (state.activeTab === 'quote' || state.activeTab === 'settings') updateQuoteTotals();
        }

        window.onload = () => { loadStorageData(); render(); };
    </script>
</body>
</html>
