    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .no-spinner::-webkit-outer-spin-button, .no-spinner::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-spinner { -moz-appearance: textfield; }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            #print-button { display: none; }
        }

        /* Sketchpad Transform UI */
        #transform-box { border: 2px dashed #3b82f6; position: absolute; pointer-events: auto; display: none; touch-action: none; z-index: 50; }
        .transform-handle { 
            position: absolute; width: 28px; height: 28px; background: white; 
            border: 2px solid #3b82f6; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; color: #3b82f6;
        }
        #handle-scale { bottom: -14px; right: -14px; cursor: nwse-resize; }
        #handle-rotate { top: -14px; right: -14px; cursor: grab; background: #eab308; border-color: #ca8a04; color: white; }
    </style>
</head>

        const PURITY_OPTIONS = {

        const ICONS = {
            pen: `<svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>`,
            highlighter: `<svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><line x1="4" y1="22" x2="20" y2="22"></line></svg>`,
            eraser: `<svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16c-.5-.5-.5-1.5 0-2l10-10c.5-.5 1.5-.5 2 0l5 5c.5.5.5 1.5 0 2l-9 9"></path><path d="M15 11l5-5"></path></svg>`,
            transform: `<svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2"></path><path d="M21 9V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"></path></svg>`,
            camera: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`,
            scale: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>`,
            rotate: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.28l5.67-5.67"/></svg>`
        };

        const state = {
            activeTab: 'quote',
            spotPrices: { gold: 3500.00, silver: 45.00, platinum: 1200.00 },
            customerName: '', phoneNumber: '', address: '', driversLicense: '',
            stoneRemovalQty: '', 
            scrapItems: [{ weight: '', material: 'gold', purity: 14, rate: 85 }],
            scrapImage: null,
            scrapTransactions: safeJSONParse('gr_scrap_ledger', []),
            ringQuoteTransactions: safeJSONParse('gr_quote_ledger', []),
            lastUpdated: 'Manual Input',
            syncStatus: 'Idle',
            isEditingNotes: false,
            scrapNotes: "• 24k gold bullion (coins/bars) is typically purchased at 95% (5% margin).\n• Treat all calculations as confidential store reference data.",
            quickCalcPurity: 'gold_14', quickCalcGrams: '',
            
            // Sketch Engine State
            isSketching: false,
            quoteImage: null,
            
            quote: {
                type: 'custom', 
                cName: '', cPhone: '', notes: '',
                taxGST: false, taxPST: false,
                meleePricePerCt: 2400.00, fancyPricePerCt: 700.00,
                melee: [
                    { size: '1.0', carat: 0.005, qty: '' }, { size: '1.2', carat: 0.008, qty: '' }, { size: '1.3', carat: 0.010, qty: '' }, { size: '1.5', carat: 0.015, qty: '' },
                    { size: '1.6', carat: 0.017, qty: '' }, { size: '1.7', carat: 0.020, qty: '' }, { size: '1.8', carat: 0.025, qty: '' }, { size: '2.0', carat: 0.030, qty: '' },
                    { size: '2.2', carat: 0.040, qty: '' }, { size: '2.3', carat: 0.045, qty: '' }, { size: '2.4', carat: 0.050, qty: '' }, { size: '2.5', carat: 0.060, qty: '' },
                    { size: '2.6', carat: 0.065, qty: '' }, { size: '2.7', carat: 0.070, qty: '' }, { size: '2.8', carat: 0.080, qty: '' }, { size: '3.0', carat: 0.100, qty: '' },
                    { size: '3.2', carat: 0.120, qty: '' }, { size: '3.5', carat: 0.170, qty: '' }, { size: '4.0', carat: 0.250, qty: '' }
                ],
                fancyShape: 'Princess', fancySizeIdx: 0, fancyQty: '',
                material: 'gold', goldGrams: '', goldKarat: 14,
                mbSize: '', mbWidth: '', mbThickness: '', 
                cRingSize: '', cBandWidth: '', cBandThickness: '', // Custom record specs
                goldPricesPerGram: { 10: 200, 14: 233, 18: 280, 19: 290, 22: 320 },
                platinumPricePerGram: 380, silverPricePerGram: 100,
                centerStone: { carats: '', shape: 'Round' },
                customAddon: '',
                rawCostRates: { melee: 300, fancy: 380, center: 400 }
            }
        };

        // --- SKETCHPAD ENGINE WITH PRO TRANSFORM LOGIC ---
        let sketchCtx;
        let isDrawing = false;
        let bgImageObj = null;
        let imgState = { x: 0, y: 0, scale: 1, rot: 0, width: 0, height: 0 };
        let sketchState = { tool: 'pen', color: '#1e3a8a', thickness: 3.0 };
        
        let transformMode = null; 
        let transformStartX = 0, transformStartY = 0;
        let transformStartDist = 1;
        let transformStartAngle = 0;
        let transformCenterX = 0, transformCenterY = 0;
        let initialImgState = {};

        function openSketcher() {
            state.isSketching = true;
            render(); 
            
            setTimeout(() => {
                const canvas = document.getElementById('sketch-canvas');
                const container = document.getElementById('sketch-container');
                if(!canvas || !container) return;
                
                canvas.width = container.clientWidth; canvas.height = container.clientHeight;
                sketchCtx = canvas.getContext('2d', { willReadFrequently: true });
                sketchCtx.clearRect(0, 0, canvas.width, canvas.height); 
                
                if (state.quoteImage && !bgImageObj) {
                    const img = new Image();
                    img.onload = () => {
                        bgImageObj = img;
                        imgState.width = img.width; imgState.height = img.height;
                        imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;
                        imgState.x = (canvas.width - (img.width * imgState.scale)) / 2;
                        imgState.y = (canvas.height - (img.height * imgState.scale)) / 2;
                        imgState.rot = 0;
                        updateTransformBox();
                    };
                    img.src = state.quoteImage;
                } else if (bgImageObj) {
                    updateTransformBox();
                }
                
                setSketchTool('pen');
                setSketchColor('#1e3a8a', 'blue');
                setSketchThickness(3.0, 2);

                // Drawing Events
                canvas.addEventListener('pointerdown', startDrawing);
                canvas.addEventListener('pointermove', draw);
                canvas.addEventListener('pointerup', stopDrawing);
                canvas.addEventListener('pointerout', stopDrawing);
                
                // Transform Events
                const tBox = document.getElementById('transform-box');
                if(tBox) {
                    tBox.addEventListener('pointerdown', handleTransformStart);
                    window.addEventListener('pointermove', handleTransformMove);
                    window.addEventListener('pointerup', handleTransformEnd);
                }
            }, 50);
        }

        function handleSketchBgUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    bgImageObj = img;
                    imgState.width = img.width; imgState.height = img.height;
                    const canvas = document.getElementById('sketch-canvas');
                    imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;
                    imgState.x = (canvas.width - (img.width * imgState.scale)) / 2;
                    imgState.y = (canvas.height - (img.height * imgState.scale)) / 2;
                    imgState.rot = 0;
                    setSketchTool('transform'); 
                    updateTransformBox();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateTransformBox() {
            const tBox = document.getElementById('transform-box');
            const imgEl = document.getElementById('sketch-bg');
            if (!tBox || !imgEl || !bgImageObj) return;

            const w = imgState.width * imgState.scale;
            const h = imgState.height * imgState.scale;

            // Update Image
            imgEl.src = bgImageObj.src;
            imgEl.style.display = 'block';
            imgEl.style.width = imgState.width + 'px';
            imgEl.style.height = imgState.height + 'px';
            imgEl.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale}) rotate(${imgState.rot}deg)`;
            imgEl.style.transformOrigin = "top left";

            // Update Box
            tBox.style.width = w + 'px';
            tBox.style.height = h + 'px';
            const cx = imgState.x + (w/2);
            const cy = imgState.y + (h/2);
            tBox.style.transform = `translate(${cx - w/2}px, ${cy - h/2}px) rotate(${imgState.rot}deg)`;
        }

        function handleTransformStart(e) {
            if (sketchState.tool !== 'transform') return;
            e.preventDefault();
            transformStartX = e.clientX; transformStartY = e.clientY;
            initialImgState = { ...imgState };

            const tBox = document.getElementById('transform-box');
            const rect = tBox.getBoundingClientRect();
            transformCenterX = rect.left + rect.width / 2;
            transformCenterY = rect.top + rect.height / 2;

            if (e.target.closest('#handle-scale')) {
                transformMode = 'scale';
                const dx = e.clientX - transformCenterX; const dy = e.clientY - transformCenterY;
                transformStartDist = Math.sqrt(dx*dx + dy*dy) || 1;
            } else if (e.target.closest('#handle-rotate')) {
                transformMode = 'rotate';
                transformStartAngle = Math.atan2(e.clientY - transformCenterY, e.clientX - transformCenterX);
            } else {
                transformMode = 'drag';
            }
        }

        function handleTransformMove(e) {
            if (!transformMode) return;
            e.preventDefault();

            if (transformMode === 'drag') {
                const dx = e.clientX - transformStartX; const dy = e.clientY - transformStartY;
                imgState.x = initialImgState.x + dx;
                imgState.y = initialImgState.y + dy;
            } else if (transformMode === 'scale') {
                const dx = e.clientX - transformCenterX; const dy = e.clientY - transformCenterY;
                const currentDist = Math.sqrt(dx*dx + dy*dy);
                // Math-based smooth scale ratio
                imgState.scale = Math.max(0.1, initialImgState.scale * (currentDist / transformStartDist));
            } else if (transformMode === 'rotate') {
                const currentAngle = Math.atan2(e.clientY - transformCenterY, e.clientX - transformCenterX);
                imgState.rot = initialImgState.rot + ((currentAngle - transformStartAngle) * (180 / Math.PI));
            }
            updateTransformBox();
        }

        function handleTransformEnd() { transformMode = null; }

        function setSketchTool(tool) {
            sketchState.tool = tool;
            ['pen', 'highlighter', 'eraser', 'transform'].forEach(t => {
                const el = document.getElementById('tool-' + t);
                if (el) { el.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-600'); el.classList.add('border-transparent', 'text-gray-600'); }
            });
            const selected = document.getElementById('tool-' + tool);
            if (selected) { selected.classList.remove('border-transparent', 'text-gray-600'); selected.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-600'); }
            
            const canvas = document.getElementById('sketch-canvas');
            const tBox = document.getElementById('transform-box');
            if(canvas && tBox) {
                if(tool === 'transform') {
                    canvas.style.pointerEvents = 'none';
                    if(bgImageObj) tBox.style.display = 'block';
                } else {
                    canvas.style.pointerEvents = 'auto';
                    tBox.style.display = 'none';
                }
            }
            
            if(sketchCtx) {
                sketchCtx.lineCap = 'round'; sketchCtx.lineJoin = 'round';
                if (tool === 'eraser') {
                    sketchCtx.globalCompositeOperation = 'destination-out';
                    sketchCtx.lineWidth = sketchState.thickness * 6; 
                    sketchCtx.globalAlpha = 1.0;
                } else {
                    sketchCtx.globalCompositeOperation = 'source-over';
                    sketchCtx.strokeStyle = sketchState.color;
                    sketchCtx.lineWidth = tool === 'highlighter' ? sketchState.thickness * 4 : sketchState.thickness;
                    sketchCtx.globalAlpha = tool === 'highlighter' ? 0.3 : 1.0;
                }
            }
        }

        function setSketchColor(color, id) {
            sketchState.color = color;
            if (sketchState.tool === 'eraser' || sketchState.tool === 'transform') setSketchTool('pen'); 
            ['black', 'blue', 'red', 'green', 'yellow'].forEach(c => {
                const el = document.getElementById('color-' + c);
                if(el) { el.classList.remove('border-gray-400', 'scale-110'); el.classList.add('border-transparent', 'scale-100'); }
            });
            const selected = document.getElementById('color-' + id);
            if(selected) { selected.classList.remove('border-transparent', 'scale-100'); selected.classList.add('border-gray-400', 'scale-110'); }
            setSketchTool('pen');
        }

        function setSketchThickness(thickness, num) {
            sketchState.thickness = thickness;
            [1, 2, 3].forEach(n => {
                const el = document.getElementById('thick-' + n);
                if(el) { el.classList.remove('bg-blue-600', 'shadow-md'); el.classList.add('bg-gray-400'); }
            });
            const selected = document.getElementById('thick-' + num);
            if(selected) { selected.classList.remove('bg-gray-400'); selected.classList.add('bg-blue-600', 'shadow-md'); }
            setSketchTool(sketchState.tool);
        }

        function startDrawing(e) { isDrawing = true; draw(e); }
        function draw(e) {
            e.preventDefault(); 
            if (!isDrawing) return;
            const canvas = document.getElementById('sketch-canvas');
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            sketchCtx.lineTo(x, y); sketchCtx.stroke(); sketchCtx.beginPath(); sketchCtx.moveTo(x, y);
        }
        function stopDrawing() { isDrawing = false; if(sketchCtx) sketchCtx.beginPath(); }

        function clearSketch() {
            const canvas = document.getElementById('sketch-canvas');
            sketchCtx.clearRect(0, 0, canvas.width, canvas.height);
            bgImageObj = null; state.quoteImage = null;
            document.getElementById('sketch-bg').style.display = 'none';
            document.getElementById('transform-box').style.display = 'none';
            setSketchTool('pen');
        }

        function saveSketch() {
            const canvas = document.getElementById('sketch-canvas');
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width; exportCanvas.height = canvas.height;
            const ctx = exportCanvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            
            if (bgImageObj) {
                ctx.save();
                const cx = imgState.x + (imgState.width * imgState.scale) / 2;
                const cy = imgState.y + (imgState.height * imgState.scale) / 2;
                ctx.translate(cx, cy);
                ctx.rotate(imgState.rot * Math.PI / 180);
                ctx.translate(-cx, -cy);
                ctx.drawImage(bgImageObj, imgState.x, imgState.y, imgState.width * imgState.scale, imgState.height * imgState.scale);
                ctx.restore();
            }
            
            ctx.drawImage(canvas, 0, 0);
            state.quoteImage = exportCanvas.toDataURL('image/jpeg', 0.8);
            state.isSketching = false;
            render();
        }

        function closeSketcher() { state.isSketching = false; render(); }

        // --- STANDARD IMAGE UPLOAD & COMPRESSION (For Scrap ID) ---
        function handleBasicImageUpload(event, targetStateKey) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    if (targetStateKey === 'scrap') state.scrapImage = canvas.toDataURL('image/jpeg', 0.6);
                    render();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- DATA EXPORT & CLEARANCE MODULE ---
        function exportCSV(type) {
            let csv = "";
            if (type === 'scrap') {
                csv = "Date,Client,Phone,Summary,Total\n";
                state.scrapTransactions.forEach(t => {
                    csv += `"${t.date}","${t.name}","${t.phone || ''}","${t.summary.replace(/"/g, '""')}","${t.total}"\n`;
                });
            } else {
                csv = "Date,Client,Phone,Type,Metal Base,Centerstone,Final Price\n";
                state.ringQuoteTransactions.forEach(q => {
                    const baseStr = q.fullData.type === 'mens_band' 
                        ? `Band Sz ${q.fullData.mbSize} | ${q.fullData.goldGrams}g ${q.fullData.material}` 
                        : `${q.fullData.goldGrams}g ${q.fullData.material}`;
                    const centerStr = q.fullData.type === 'mens_band' ? 'N/A' : `${q.fullData.centerStone?.carats || 0}ct ${q.fullData.centerStone?.shape || 'Round'}`;
                    csv += `"${q.date}","${q.name}","${q.phone || ''}","${q.fullData.type}","${baseStr}","${centerStr}","${q.total}"\n`;
                });
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${type}_Ledger_Export_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function clearHistory() {
            const range = document.getElementById('clear-history-range').value;
            const startDateEl = document.getElementById('clear-start-date').value;
            const endDateEl = document.getElementById('clear-end-date').value;

            if (!confirm("WARNING: Are you sure you want to delete ledger history? Ensure you have exported a backup first!")) return;

            let filteredScrap = []; let filteredQuotes = [];

            if (range === 'all') {
                filteredScrap = []; filteredQuotes = [];
            } else if (range === '365') {
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - 365);
                filteredScrap = state.scrapTransactions.filter(t => new Date(t.date) > cutoffDate);
                filteredQuotes = state.ringQuoteTransactions.filter(t => new Date(t.date) > cutoffDate);
            } else if (range === 'custom') {
                if (!startDateEl || !endDateEl) return alert("Please select both a start and end date for the custom range.");
                const start = new Date(startDateEl); start.setHours(0,0,0,0);
                const end = new Date(endDateEl); end.setHours(23,59,59,999);
                if (start > end) return alert("Start date must be before end date.");

                filteredScrap = state.scrapTransactions.filter(t => { const tDate = new Date(t.date); return tDate < start || tDate > end; });
                filteredQuotes = state.ringQuoteTransactions.filter(t => { const tDate = new Date(t.date); return tDate < start || tDate > end; });
            }

            const scrapDeleted = state.scrapTransactions.length - filteredScrap.length;
            const quotesDeleted = state.ringQuoteTransactions.length - filteredQuotes.length;

            state.scrapTransactions = filteredScrap;
            state.ringQuoteTransactions = filteredQuotes;

            localStorage.setItem('gr_scrap_ledger', JSON.stringify(state.scrapTransactions));
            localStorage.setItem('gr_quote_ledger', JSON.stringify(state.ringQuoteTransactions));
            
            render();
            alert(`Success! Deleted ${scrapDeleted} Scrap records and ${quotesDeleted} Quote records.`);
        }

        async function fetchLivePrices() {
            if (GOLD_API_KEY.includes('INSERT')) return alert("Please map your live GoldAPI token key profile inside the source parameters.");
            state.syncStatus = 'Fetching...'; updateSpotUI(); 
            try {
                const headers = { 'x-access-token': GOLD_API_KEY, 'Content-Type': 'application/json' };
                const endpoints = ['XAU', 'XAG', 'XPT'];
                const responses = await Promise.all(endpoints.map(m => fetch(`https://www.goldapi.io/api/${m}/CAD`, { headers }).then(res => res.json())));
                
                state.spotPrices.gold = responses[0].price;
                state.spotPrices.silver = responses[1].price;
                state.spotPrices.platinum = responses[2].price;
                state.lastUpdated = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                state.syncStatus = 'Synced';
                
                if(state.activeTab === 'calculator') updateScrapUI();
                if(state.activeTab === 'spot_price') updateSpotUI();
                if(state.activeTab === 'quote') updateQuoteTotals();
            } catch (error) {
                state.syncStatus = 'Failed'; if(state.activeTab === 'spot_price') updateSpotUI();
                alert("Network connectivity error: " + error.message);
            }
        }

        function calculateScrapTotal() {
            let gross = state.scrapItems.reduce((total, item) => {
                const w = Number(item.weight) || 0; const r = Number(item.rate) || 0;
                if (!w) return total;
                const spot = (state.spotPrices[item.material] || 0) / TROY_ONCE_GRAMS;
                const purityFactor = item.material === 'gold' ? item.purity / 24 : item.purity;
                return total + (w * purityFactor * spot * (r / 100));
            }, 0);
            let deduction = (Number(state.stoneRemovalQty) || 0) * 5;
            return Math.max(0, gross - deduction);
        }

        function updateScrapUI() {
            state.scrapItems.forEach((item, idx) => {
                const w = Number(item.weight) || 0; const r = Number(item.rate) || 0;
                const spot = (state.spotPrices[item.material] || 0) / TROY_ONCE_GRAMS;
                const purityFactor = item.material === 'gold' ? item.purity / 24 : item.purity;
                const rowTotal = w * purityFactor * spot * (r / 100);
                const el = document.getElementById(`scrap-row-total-${idx}`);
                if (el) el.innerText = '$' + rowTotal.toFixed(2);
            });
            const grandEl = document.getElementById('scrap-grand-total');
            if (grandEl) grandEl.innerText = '$' + calculateScrapTotal().toFixed(2);
        }

        function updateSpotUI() {
            const baseGoldGram = state.spotPrices.gold / TROY_ONCE_GRAMS;
            const baseSilverGram = state.spotPrices.silver / TROY_ONCE_GRAMS;
            const basePlatGram = state.spotPrices.platinum / TROY_ONCE_GRAMS;

            const gMatrix = document.getElementById('spot-gold-matrix');
            if(gMatrix) gMatrix.innerHTML = Array.from({length: 15}, (_, i) => i + 10).map(k => `<div class="flex justify-between border-b border-gray-100 pb-1"><span class="font-semibold text-gray-500">${k}k Solid</span><span class="font-mono text-gray-700 font-bold">$${(baseGoldGram * (k / 24)).toFixed(2)}/g</span></div>`).join('');
            
            const sMatrix = document.getElementById('spot-silver-matrix');
            if(sMatrix) sMatrix.innerHTML = [0.999, 0.925, 0.800, 0.700, 0.600, 0.500].map(p => `<div class="flex justify-between border-b border-gray-100 pb-1"><span class="font-semibold text-gray-500">${p === 0.999 ? 'Fine Pure (.999)' : 'Grade Spec ' + p}</span><span class="font-mono text-gray-700 font-bold">$${(baseSilverGram * p).toFixed(2)}/g</span></div>`).join('');

        function saveScrapTransaction() {
            if (!state.customerName || state.scrapItems.every(i => !i.weight)) return alert("Complete the client identity data and map at least one item.");
            const total = calculateScrapTotal();
            const deductionLog = Number(state.stoneRemovalQty) > 0 ? ` [Stones Removed: ${state.stoneRemovalQty} (-$${state.stoneRemovalQty * 5})]` : '';
            const log = state.scrapItems.filter(i => i.weight).map(i => `${i.weight}g ${i.material} (${i.material==='gold'?i.purity+'k':i.purity})`).join(', ') + deductionLog;
            
            state.scrapTransactions.unshift({
                date: new Date().toLocaleString(), name: state.customerName, phone: state.phoneNumber,

        function calculateQuickRawCost() {
            const grams = Number(state.quickCalcGrams) || 0;
            if (!grams) return "0.00";
            const [metal, spec] = state.quickCalcPurity.split('_');
            const spot = (state.spotPrices[metal] || 0) / TROY_ONCE_GRAMS;
            let factor = 1;
            if (metal === 'gold') factor = Number(spec) / 24;
            else if (metal === 'silver' || metal === 'platinum') factor = Number(spec) / 1000;
            return (grams * spot * factor).toFixed(2);
        }

        // --- RING QUOTE LOGIC ---
        function calculateRingTotalWithTax() {
            let totalMeleeCts = 0;
            (state.quote.melee || []).forEach((m) => { totalMeleeCts += (Number(m.qty) || 0) * m.carat; });
            const standardRetailMeleeCost = totalMeleeCts * (state.quote.meleePricePerCt || 0);

            const shapeArr = FANCY_SHAPES[state.quote.fancyShape] || FANCY_SHAPES['Princess'];
            const fancyShapeData = shapeArr[state.quote.fancySizeIdx] || shapeArr[0];
            const fancyCts = (Number(state.quote.fancyQty) || 0) * fancyShapeData.carat;
            const retailFancyCost = fancyCts * (state.quote.fancyPricePerCt || 0);

            let retailMaterialCost = 0;
            const grams = Number(state.quote.goldGrams) || 0;
            if (state.quote.material === 'gold') retailMaterialCost = grams * (state.quote.goldPricesPerGram[state.quote.goldKarat] || 0);
            else if (state.quote.material === 'platinum') retailMaterialCost = grams * (state.quote.platinumPricePerGram || 0);
            else if (state.quote.material === 'silver') retailMaterialCost = grams * (state.quote.silverPricePerGram || 0);

            let retailCenterCost = 0;
            if (state.quote.type === 'custom') {
                const centerCarats = Number(state.quote.centerStone?.carats) || 0;
                let centerMultiplier = state.quote.rawCostRates?.center || 400; 
                if (centerCarats > 0 && centerCarats < 2.0) centerMultiplier = 1300; 
                else if (centerCarats >= 2.0 && centerCarats < 3.0) centerMultiplier = 1200;
                else if (centerCarats >= 3.0) centerMultiplier = 1000;
                retailCenterCost = centerCarats * centerMultiplier;
            }

            const customAddon = Number(state.quote.customAddon) || 0;
            let subtotal = standardRetailMeleeCost + retailFancyCost + retailMaterialCost + retailCenterCost + customAddon;

            if (state.quote.taxGST) subtotal *= 1.05;
            if (state.quote.taxPST) subtotal *= 1.07;
            return subtotal;
        }

        function updateQuoteTotals() {
            if (state.quote.type === 'mens_band') {
                const sz = Number(state.quote.mbSize) || 0; const w = Number(state.quote.mbWidth) || 0; const t = Number(state.quote.mbThickness) || 0;
                if (sz && w && t) {
                    const diameter = 11.63 + (0.8128 * sz);
                    const vol_cm3 = (w * t * Math.PI * (diameter + t)) / 1000;
                    let density = 13.1;
                    if (state.quote.material === 'gold') density = DENSITIES.gold[state.quote.goldKarat] || 13.1;
                    else if (state.quote.material === 'platinum') density = DENSITIES.platinum;
                    else if (state.quote.material === 'silver') density = DENSITIES.silver;
                    state.quote.goldGrams = (vol_cm3 * density).toFixed(2);
                } else { state.quote.goldGrams = ''; }
                const mbWeightDisplay = document.getElementById('mb-calculated-weight');
                if (mbWeightDisplay) mbWeightDisplay.innerText = state.quote.goldGrams ? state.quote.goldGrams + 'g' : '0.00g';
            }

            let totalMeleeCts = 0;
            (state.quote.melee || []).forEach((m, idx) => {
                const qty = Number(m.qty) || 0;
                totalMeleeCts += qty * m.carat;
                const el = document.getElementById(`quote-melee-row-${idx}`);
                if (el) el.innerText = (qty * m.carat).toFixed(3);
            });

            const shapeArr = FANCY_SHAPES[state.quote.fancyShape] || FANCY_SHAPES['Princess'];
            const fancyShapeData = shapeArr[state.quote.fancySizeIdx] || shapeArr[0];
            const fancyCts = (Number(state.quote.fancyQty) || 0) * fancyShapeData.carat;
            const elFancySub = document.getElementById('quote-fancy-row-total');
            if (elFancySub) elFancySub.innerText = fancyCts.toFixed(3);

            const finalRingCost = calculateRingTotalWithTax();

            const elMeleeCts = document.getElementById('quote-total-melee-cts');
            const elFinalTotal = document.getElementById('quote-final-total');

            if (elMeleeCts) elMeleeCts.innerText = (totalMeleeCts + fancyCts).toFixed(3);
            if (elFinalTotal) elFinalTotal.innerText = `$${finalRingCost.toFixed(2)}`;
        }

                            <div class="flex gap-2 border-r pr-4 sm:pr-6 border-gray-200 text-gray-600">
                                <button id="tool-pen" onclick="setSketchTool('pen')" class="p-2 bg-blue-50 text-blue-600 rounded-xl shadow-inner border-2 border-blue-500 transition-all" title="Pen Tool">${ICONS.pen}</button>
                                <button id="tool-highlighter" onclick="setSketchTool('highlighter')" class="p-2 bg-transparent hover:bg-gray-100 rounded-xl border-2 border-transparent transition-all" title="Highlighter">${ICONS.highlighter}</button>
                                <button id="tool-eraser" onclick="setSketchTool('eraser')" class="p-2 bg-transparent hover:bg-gray-100 rounded-xl border-2 border-transparent transition-all" title="Eraser">${ICONS.eraser}</button>

                                <button id="color-blue" onclick="setSketchColor('#1e3a8a', 'blue')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-blue-800 border-2 border-gray-400 shadow-sm scale-110 transition-all"></button>
                                <button id="color-red" onclick="setSketchColor('#dc2626', 'red')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-red-600 border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                                <button id="color-green" onclick="setSketchColor('#16a34a', 'green')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-green-600 border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                                <button id="color-yellow" onclick="setSketchColor('#facc15', 'yellow')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-yellow-400 border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                            </div>
                            <div class="flex gap-3 sm:gap-4 items-center pl-2">
                                <button id="thick-1" onclick="setSketchThickness(1.5, 1)" class="w-4 h-4 bg-gray-400 rounded-full hover:bg-gray-600 transition-all shadow-none"></button>
                                <button id="thick-2" onclick="setSketchThickness(3.0, 2)" class="w-6 h-6 bg-blue-600 rounded-full shadow-md transition-all"></button>
                                <button id="thick-3" onclick="setSketchThickness(6.0, 3)" class="w-8 h-8 bg-gray-400 rounded-full hover:bg-gray-600 transition-all shadow-none"></button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        }

        function buildSpotHTML() {
            return `
                <div class="p-4 md:p-8 bg-white rounded-b-2xl rounded-tr-2xl shadow-lg border border-gray-100 space-y-6 animate-fadeIn">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 rounded-xl border border-gray-200/80 gap-3">
                        <div class="space-y-0.5">
                            <h3 class="text-xs font-bold text-gray-600 uppercase tracking-wider">Live System Price Engine Metrics</h3>
                            <p class="text-[11px] text-gray-400 font-medium">Last Confirmed Feed Query Session: <span class="font-bold">${state.lastUpdated}</span></p>
                        </div>
                        <button onclick="fetchLivePrices()" class="text-xs bg-blue-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-sm transition-all">Execute Core Synced Feed Update (${state.syncStatus})</button>
                    </div>

                    <div class="space-y-2">
                        <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-1">Modify Raw Feed Anchors (per Ounce)</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${['gold', 'silver', 'platinum'].map(m => `
                                <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 shadow-sm">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">${m.toUpperCase()}</label>
                                    <input type="number" class="w-full p-2 border rounded-lg font-bold bg-white text-sm" value="${state.spotPrices[m]}" oninput="state.spotPrices.${m}=Number(this.value); updateScrapUI(); updateSpotUI();" />
                                </div>
                            `).join('')}

                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 pt-4">
                        <div class="border border-gray-100 bg-gray-50/30 rounded-2xl p-4 flex flex-col">
                            <h4 class="font-black text-amber-600 border-b pb-1.5 mb-2 uppercase tracking-wider text-[11px]">Gold Matrix Breakdown</h4>
                            <div id="spot-gold-matrix" class="flex-1 max-h-72 overflow-y-auto space-y-1.5 text-xs pr-1"></div>
                        </div>

                        <div class="border border-gray-100 bg-gray-50/30 rounded-2xl p-4 flex flex-col">
                            <h4 class="font-black text-gray-500 border-b pb-1.5 mb-2 uppercase tracking-wider text-[11px]">Silver Matrix Purity Rows</h4>
                            <div id="spot-silver-matrix" class="space-y-2 text-xs"></div>
                        </div>

                        <div class="border border-gray-100 bg-gray-50/30 rounded-2xl p-4 flex flex-col">
                            <h4 class="font-black text-blue-500 border-b pb-1.5 mb-2 uppercase tracking-wider text-[11px]">Platinum Matrix Arrays</h4>
                            <div id="spot-plat-matrix" class="space-y-2 text-xs"></div>
                        </div>
                    </div>
                    
                    <div class="mt-4 bg-gray-900 text-white p-5 rounded-2xl shadow-xl border border-gray-800">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-800 pb-2 mb-4">Quick Raw Metal Calculator</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end text-xs">
                            <div>
                                <label class="text-[10px] text-gray-400 font-bold block mb-1">Select Metal Purity</label>
                                <select class="w-full p-2.5 rounded-xl font-bold bg-gray-800 text-white border border-gray-700 focus:ring-2 focus:ring-gray-600" onchange="state.quickCalcPurity=this.value; updateSpotUI()">
                                    <option value="gold_10" ${state.quickCalcPurity==='gold_10'?'selected':''}>10k Gold</option>
                                    <option value="gold_14" ${state.quickCalcPurity==='gold_14'?'selected':''}>14k Gold</option>
                                    <option value="gold_18" ${state.quickCalcPurity==='gold_18'?'selected':''}>18k Gold</option>
                                    <option value="gold_19" ${state.quickCalcPurity==='gold_19'?'selected':''}>19k Gold</option>
                                    <option value="gold_22" ${state.quickCalcPurity==='gold_22'?'selected':''}>22k Gold</option>
                                    <option value="gold_24" ${state.quickCalcPurity==='gold_24'?'selected':''}>24k Gold</option>
                                    <option value="silver_925" ${state.quickCalcPurity==='silver_925'?'selected':''}>.925 Silver</option>
                                    <option value="silver_999" ${state.quickCalcPurity==='silver_999'?'selected':''}>.999 Silver</option>
                                    <option value="platinum_950" ${state.quickCalcPurity==='platinum_950'?'selected':''}>.950 Platinum</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 font-bold block mb-1">Input Grams</label>
                                <input type="number" class="w-full p-2.5 rounded-xl font-bold bg-gray-800 text-white border border-gray-700 shadow-inner" placeholder="0.00" value="${state.quickCalcGrams}" oninput="state.quickCalcGrams=this.value; updateSpotUI()" />
                            </div>
                            <div class="bg-green-900/30 p-2.5 rounded-xl border border-green-800 text-center">
                                <span class="text-[10px] text-green-400 uppercase block mb-0.5">Total Raw Cost</span>
                                <span id="spot-quick-total" class="text-xl font-black text-green-400">$${calculateQuickRawCost()}</span>
                            </div>
                        </div>
                    </div>
                </div>
                ${(setTimeout(updateSpotUI, 0), '')}
            `;
        }

        function buildSettingsHTML() {
            return `
                <div class="p-6 md:p-8 bg-white rounded-b-2xl rounded-tr-2xl shadow-lg border border-gray-100 space-y-6 animate-fadeIn">
                    <div class="flex justify-between items-center border-b pb-4">
                        <h2 class="text-xl font-black text-gray-800">Operational Default Pricing Profiles</h2>
                        <button id="save-settings-btn" onclick="saveSystemSettings()" class="bg-blue-600 text-white font-bold py-2.5 px-6 rounded-xl hover:bg-blue-700 shadow-sm text-xs md:text-sm transition-all">Save Default Settings</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 space-y-4">
                            <h3 class="text-xs font-bold text-gray-700 uppercase tracking-widest border-b pb-2">Consumer Stone Markups (per Ct)</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[10px] font-bold text-gray-400 block mb-1">Standard Melee</label><input type="number" class="border p-2 rounded-xl w-full font-bold bg-white shadow-sm" value="${state.quote.meleePricePerCt}" oninput="state.quote.meleePricePerCt=Number(this.value); saveSystemSettings();" /></div>
                                <div><label class="text-[10px] font-bold text-gray-400 block mb-1">Fancy Shaped</label><input type="number" class="border p-2 rounded-xl w-full font-bold bg-white shadow-sm" value="${state.quote.fancyPricePerCt}" oninput="state.quote.fancyPricePerCt=Number(this.value); saveSystemSettings();" /></div>
                            </div>
                            <div class="pt-2 space-y-2">
                                <h4 class="text-[10px] font-bold text-gray-400 uppercase">Center Stone Retails</h4>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-[9px] text-gray-400 block">1-2ct</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.centerStones?.tier1?.price || ''}" oninput="state.quote.centerStones.tier1={price:Number(this.value)}; saveSystemSettings();" /></div>
                                    <div><label class="text-[9px] text-gray-400 block">2-3ct</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.centerStones?.tier2?.price || ''}" oninput="state.quote.centerStones.tier2={price:Number(this.value)}; saveSystemSettings();" /></div>
                                    <div><label class="text-[9px] text-gray-400 block">3-5ct</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.centerStones?.tier3?.price || ''}" oninput="state.quote.centerStones.tier3={price:Number(this.value)}; saveSystemSettings();" /></div>
                                </div>
                            </div>
                            
                            <div class="pt-4 border-t border-gray-200 space-y-2">
                                <h3 class="text-xs font-bold text-gray-700 uppercase tracking-widest">Internal Core Wholesale Cost Rates</h3>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-[9px] text-gray-400 block">Melee (/ct)</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.rawCostRates.melee}" oninput="state.quote.rawCostRates.melee=Number(this.value); saveSystemSettings();" /></div>
                                    <div><label class="text-[9px] text-gray-400 block">Fancy (/ct)</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.rawCostRates.fancy}" oninput="state.quote.rawCostRates.fancy=Number(this.value); saveSystemSettings();" /></div>
                                    <div><label class="text-[9px] text-gray-400 block">Center (/ct)</label><input type="number" class="border p-1.5 rounded-lg w-full text-xs font-bold bg-white" value="${state.quote.rawCostRates.center}" oninput="state.quote.rawCostRates.center=Number(this.value); saveSystemSettings();" /></div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-blue-50/30 p-5 rounded-2xl border border-blue-100 space-y-4">
                            <h3 class="text-xs font-bold text-blue-800 uppercase tracking-widest border-b pb-2">Ring Metal Rates (per Gram)</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                                ${[10, 14, 18, 19, 22].map(k => `
                                    <div>
                                        <label class="text-[9px] font-bold text-gray-500 block mb-0.5">${k}k Gold</label>
                                        <input type="number" class="border p-2 rounded-xl w-full text-xs font-bold bg-white" value="${state.quote.goldPricesPerGram[k] || ''}" oninput="state.quote.goldPricesPerGram[${k}]=Number(this.value); saveSystemSettings();" />
                                    </div>
                                `).join('')}
                            </div>
                            <div class="grid grid-cols-2 gap-4 pt-3 border-t border-blue-200">
                                <div><label class="text-[10px] font-bold text-gray-500 block mb-0.5">Platinum</label><input type="number" class="border p-2 rounded-xl w-full text-xs font-bold bg-white" value="${state.quote.platinumPricePerGram}" oninput="state.quote.platinumPricePerGram=Number(this.value); saveSystemSettings();" /></div>
                                <div><label class="text-[10px] font-bold text-gray-500 block mb-0.5">Silver Base</label><input type="number" class="border p-2 rounded-xl w-full text-xs font-bold bg-white" value="${state.quote.silverPricePerGram}" oninput="state.quote.silverPricePerGram=Number(this.value); saveSystemSettings();" /></div>
                            </div>
                        </div>
                        
                        <div class="bg-red-50/30 p-5 rounded-2xl border border-red-100 space-y-4 md:col-span-2 mt-4">
                            <h3 class="text-xs font-bold text-red-800 uppercase tracking-widest border-b border-red-200 pb-2">Data Operations & Ledger Management</h3>
                            <div class="flex flex-col md:flex-row gap-4 items-end">
                                <div class="flex-1 w-full space-y-2">
                                    <button onclick="exportCSV('scrap')" class="w-full bg-white border border-red-200 text-red-700 font-bold py-2 rounded-xl hover:bg-red-50 transition-all text-[10px] uppercase shadow-sm">⬇️ Export Scrap (.csv)</button>
                                    <button onclick="exportCSV('quote')" class="w-full bg-white border border-red-200 text-red-700 font-bold py-2 rounded-xl hover:bg-red-50 transition-all text-[10px] uppercase shadow-sm">⬇️ Export Quotes (.csv)</button>
                                </div>
                                <div class="flex-1 w-full space-y-1">
                                    <label class="text-[10px] font-bold text-red-400 uppercase pl-1">Target Deletion Scope</label>
                                    <select id="clear-history-range" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-gray-700 focus:ring-2 focus:ring-red-200">
                                        <option value="365">Purge Records > 365 Days Old</option>
                                        <option value="custom">Specific Range (Requires Dates Below)</option>
                                        <option value="all">Wipe All Historical Databases</option>
                                    </select>
                                </div>
                                <div class="flex-1 w-full space-y-1">
                                    <label class="text-[10px] font-bold text-red-400 uppercase pl-1">Target Start</label>
                                    <input type="date" id="clear-start-date" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-gray-700" />
                                </div>
                                <div class="flex-1 w-full space-y-1">
                                    <label class="text-[10px] font-bold text-red-400 uppercase pl-1">Target End</label>
                                    <input type="date" id="clear-end-date" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-gray-700" />
                                </div>
                                <div class="flex-1 w-full">
                                    <button onclick="clearHistory()" class="w-full bg-red-600 text-white font-bold py-2.5 px-4 rounded-xl hover:bg-red-700 shadow-sm transition-all text-xs">🗑️ Execute Purge</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildLedgerHTML() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fadeIn text-xs">
                    <div class="p-5 bg-white rounded-2xl shadow-md border border-gray-100">
                        <h2 class="text-sm font-black mb-4 text-gray-800 uppercase tracking-wider border-b pb-2">Scrap Payout History Ledger</h2>
                        ${state.scrapTransactions.length === 0 ? '<p class="text-center text-gray-400 py-12">No purchases filed for current lifecycle.</p>' : `
                            <div class="space-y-3 max-h-[450px] overflow-y-auto pr-1">
                                ${state.scrapTransactions.map((t, idx) => `
                                    <div onclick="showScrapDetails(${idx})" class="p-3 bg-gray-50 rounded-xl border flex justify-between items-center shadow-sm cursor-pointer hover:bg-green-50 transition-colors">
                                        <div class="space-y-1"><p class="font-bold text-gray-800">${t.name}</p><p class="text-[10px] text-gray-400">${t.date} • ${t.summary}</p></div>
                                        <span class="font-black text-green-600 text-sm">$${t.total}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>

                    <div class="p-5 bg-white rounded-2xl shadow-md border border-gray-100">
                        <h2 class="text-sm font-black mb-4 text-gray-800 uppercase tracking-wider border-b pb-2">Ring Consultation Quotation Ledger</h2>
                        ${state.ringQuoteTransactions.length === 0 ? '<p class="text-center text-gray-400 py-12">No retail ring layouts profiled yet.</p>' : `
                            <div class="space-y-3 max-h-[450px] overflow-y-auto pr-1">
                                ${state.ringQuoteTransactions.map((q, idx) => `
                                    <div onclick="showQuoteDetails(${idx})" class="p-3 bg-gray-50 rounded-xl border flex justify-between items-center shadow-sm cursor-pointer hover:bg-blue-50 transition-colors">
                                        <div class="space-y-1"><p class="font-bold text-gray-800">${q.name}</p><p class="text-[10px] text-gray-400">${q.date} • ${q.summary}</p></div>
                                        <span class="font-black text-blue-600 text-sm">${q.total}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function buildBabyRingsHTML() {
            return `
                <div class="p-16 text-center bg-white rounded-b-2xl rounded-tr-2xl shadow-lg border border-dashed border-4 border-gray-200 animate-fadeIn">
                     <h3 class="text-xl font-black text-gray-600">Baby Rings Module Workspace</h3>
                     <p class="text-xs text-gray-400 mt-2 max-w-sm mx-auto">This architectural node is partitioned safely to prevent configuration collision parameters during future functional additions.</p>
                </div>
            `;
        }

        function render() {
            try {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="max-w-4xl mx-auto">
                        <div class="text-center mb-8 pt-4">
                            <h1 style="font-family: 'Playfair Display', serif;" class="text-5xl italic text-gray-900 tracking-wide">Gold and Rose</h1>
                        </div>
                        ${buildTabsHTML()}
                        ${state.activeTab === 'calculator' ? buildScrapHTML() : ''}
                        ${state.activeTab === 'quote' ? buildQuoteHTML() : ''}
                        ${state.activeTab === 'spot_price' ? buildSpotHTML() : ''}
                        ${state.activeTab === 'settings' ? buildSettingsHTML() : ''}
                        ${state.activeTab === 'ledger' ? buildLedgerHTML() : ''}
                        ${state.activeTab === 'baby_rings' ? buildBabyRingsHTML() : ''}
                    </div>
                    <div id="modal-backdrop" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
                        <div id="modal-content" class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh]"></div>
                    </div>
                `;
                if (state.activeTab === 'quote' || state.activeTab === 'settings') {
                    updateQuoteTotals();
                }
            } catch (e) {
                console.error("Critical Render Failure:", e);
                document.getElementById('app').innerHTML = `<div class="p-10 text-center text-red-500 font-bold">A critical rendering error occurred. Please clear your browser cache and refresh.</div>`;
            }
        }

        window.onload = () => { 
            loadStorageData(); 
            render(); 
        };
    </script>
</body>
</html>
