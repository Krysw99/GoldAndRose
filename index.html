                                    <input type="number" class="border p-2.5 rounded-xl w-1/2 text-xs font-bold shadow-sm" placeholder="$0" value="${state.settings.tennisLaborRetail || ''}" oninput="state.settings.tennisLaborRetail=Number(this.value);" />
                                </div>
                                <h4 class="text-[10px] font-bold text-brand-500 uppercase tracking-widest mt-2 border-t border-brand-200 pt-3 mb-2">Tennis Metal Price (per Gram)</h4>
                                <div class="grid grid-cols-3 gap-3">
                                    ${[10,14,18,19,22].map(k=>`<div><label class="text-[9px] font-bold text-brand-500 block mb-1">${k}k Gold</label><input type="number" class="border p-2 rounded-xl w-full text-xs font-bold shadow-sm" value="${state.settings.tennisGoldPricesPerGram[k]}" oninput="state.settings.tennisGoldPricesPerGram[${k}]=Number(this.value);" /></div>`).join('')}
                                    <div><label class="text-[9px] font-bold text-brand-500 block mb-1">Platinum</label><input type="number" class="border p-2 rounded-xl w-full text-xs font-bold shadow-sm" value="${state.settings.tennisPlatinumPricePerGram}" oninput="state.settings.tennisPlatinumPricePerGram=Number(this.value);" /></div>
                                    <div><label class="text-[9px] font-bold text-brand-500 block mb-1">Silver Base</label><input type="number" class="border p-2 rounded-xl w-full text-xs font-bold shadow-sm" value="${state.settings.tennisSilverPricePerGram}" oninput="state.settings.tennisSilverPricePerGram=Number(this.value);" /></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-brand-50 p-5 rounded-2xl border border-brand-200 space-y-4 shadow-sm w-full">
                        <div class="flex justify-between items-center border-b border-brand-200 pb-2">
                            <h3 class="text-xs font-black text-brand-800 uppercase tracking-widest">Internal Raw Cost Layouts</h3>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-bold text-brand-400 font-mono uppercase">Ounce Sync Target</span>
                                <button onclick="window.fetchLivePrices()" class="bg-brand-800 text-brand-gold text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-lg shadow-sm hover:brightness-110">Sync Feed</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-3">
                                <h4 class="text-[10px] font-bold text-brand-400 uppercase tracking-wider">Global Stone Bases</h4>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="text-[9px] text-brand-500 font-bold block mb-1">Melee (/ct)</label><input type="number" class="border p-2 rounded-lg w-full text-xs font-bold shadow-sm" value="${state.settings.rawCostRates.melee}" oninput="state.settings.rawCostRates.melee=Number(this.value);" /></div>
                                    <div><label class="text-[9px] text-brand-500 font-bold block mb-1">Fancy (/ct)</label><input type="number" class="border p-2 rounded-lg w-full text-xs font-bold shadow-sm" value="${state.settings.rawCostRates.fancy}" oninput="state.settings.rawCostRates.fancy=Number(this.value);" /></div>
                                    <div><label class="text-[9px] text-brand-500 font-bold block mb-1">Center (/ct)</label><input type="number" class="border p-2 rounded-lg w-full text-xs font-bold shadow-sm" value="${state.settings.rawCostRates.center}" oninput="state.settings.rawCostRates.center=Number(this.value);" /></div>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <h4 class="text-[10px] font-bold text-brand-400 uppercase tracking-wider">Active Raw Spot Costs (per Ounce)</h4>
                                <div class="grid grid-cols-3 gap-2 font-mono text-xs font-bold text-brand-700 bg-white p-2 rounded-xl border border-brand-200 shadow-inner min-h-[44px] items-center">
                                    <div class="text-center border-r border-brand-100"><span class="text-[8px] uppercase tracking-wider block text-brand-400 font-sans">Gold</span>$${state.spotPrices.gold.toFixed(0)}</div>
                                    <div class="text-center border-r border-brand-100"><span class="text-[8px] uppercase tracking-wider block text-brand-400 font-sans">Silver</span>$${state.spotPrices.silver.toFixed(2)}</div>
                                    <div class="text-center"><span class="text-[8px] uppercase tracking-wider block text-brand-400 font-sans">Plat</span>$${state.spotPrices.platinum.toFixed(0)}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-red-50/50 p-5 rounded-2xl border border-red-100 space-y-4">
                        <h3 class="text-xs font-bold text-red-800 uppercase tracking-widest border-b border-red-200 pb-2">Data Operations & Ledger Management</h3>
                        <div class="flex flex-col md:flex-row gap-4 items-end">
                            <div class="flex-1 w-full space-y-2">
                                <button onclick="window.exportCSV('scrap')" class="w-full bg-white border border-red-200 text-red-700 font-bold py-2.5 rounded-xl hover:bg-red-50 transition-all text-[10px] uppercase tracking-wider shadow-sm">⬇️ Export Scrap (.csv)</button>
                                <button onclick="window.exportCSV('quote')" class="w-full bg-white border border-red-200 text-red-700 font-bold py-2.5 rounded-xl hover:bg-red-50 transition-all text-[10px] uppercase tracking-wider shadow-sm">⬇️ Export Quotes (.csv)</button>
                            </div>
                            <div class="flex-1 w-full space-y-1">
                                <label class="text-[10px] font-bold text-red-500 uppercase tracking-wider pl-1">Target Deletion Scope</label>
                                <select id="clear-history-range" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-brand-800 shadow-sm">
                                    <option value="365">Purge Records > 365 Days Old</option><option value="custom">Specific Range</option><option value="all">Wipe All Historical Databases</option>
                                </select>
                            </div>
                            <div class="flex-1 w-full space-y-1">
                                <label class="text-[10px] font-bold text-red-500 uppercase tracking-wider pl-1">Target Start</label>
                                <input type="date" id="clear-start-date" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-brand-800 shadow-sm" />
                            </div>
                            <div class="flex-1 w-full space-y-1">
                                <label class="text-[10px] font-bold text-red-500 uppercase tracking-wider pl-1">Target End</label>
                                <input type="date" id="clear-end-date" class="border border-red-200 p-2.5 rounded-xl w-full text-xs font-bold bg-white text-brand-800 shadow-sm" />
                            </div>
                            <div class="flex-1 w-full">
                                <button onclick="window.clearHistory()" class="w-full bg-red-600 text-white font-bold py-2.5 px-4 rounded-xl shadow-md text-xs uppercase tracking-wider hover:bg-red-700 transition-colors">🗑️ Execute Purge</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildModals() {
            if(!state.modal) return '';
            const m = state.modal;
            
            let content = '';
            if(m.type === 'addRing') {
                content = `<div class="flex flex-col gap-3">
                    <button onclick="state.quoteSession.rings.push(getEmptyRing('customRing')); state.quoteSession.activeSubTab=state.quoteSession.rings[state.quoteSession.rings.length-1].id; state.modal=null; window.render()" class="bg-brand-50 hover:bg-brand-100 font-bold py-3.5 rounded-xl border border-brand-200 transition-colors">Engagement / Custom</button>
                    <button onclick="state.quoteSession.rings.push(getEmptyRing('weddingBand')); state.quoteSession.activeSubTab=state.quoteSession.rings[state.quoteSession.rings.length-1].id; state.modal=null; window.render()" class="bg-brand-50 hover:bg-brand-100 font-bold py-3.5 rounded-xl border border-brand-200 transition-colors">Wedding Band</button>
                    <button onclick="state.quoteSession.rings.push(getEmptyRing('mensBand')); state.quoteSession.activeSubTab=state.quoteSession.rings[state.quoteSession.rings.length-1].id; state.modal=null; window.render()" class="bg-brand-50 hover:bg-brand-100 font-bold py-3.5 rounded-xl border border-brand-200 transition-colors">Men's Band</button>
                    <button onclick="state.quoteSession.rings.push(getEmptyRing('pendant')); state.quoteSession.activeSubTab=state.quoteSession.rings[state.quoteSession.rings.length-1].id; state.modal=null; window.render()" class="bg-brand-50 hover:bg-brand-100 font-bold py-3.5 rounded-xl border border-brand-200 transition-colors">Pendant</button>
                    <button onclick="state.quoteSession.rings.push(getEmptyRing('tennisBracelet')); state.quoteSession.activeSubTab=state.quoteSession.rings[state.quoteSession.rings.length-1].id; state.modal=null; window.render()" class="bg-brand-50 hover:bg-brand-100 font-bold py-3.5 rounded-xl border border-brand-200 transition-colors">Tennis Bracelet</button>
                </div>
                <button onclick="state.modal=null; window.render()" class="mt-5 text-xs font-bold text-brand-400 uppercase tracking-widest hover:text-brand-800">Close</button>`;
            } 
            else if(m.type === 'scrapLink') {
                content = `<div class="max-h-60 overflow-y-auto mb-4 text-left space-y-2 mt-4 hide-scrollbar">
                    ${state.scrapTransactions.map(t => `<div onclick="window.applyScrapCredit('${t.id}')" class="p-3 bg-brand-50 rounded-xl cursor-pointer hover:bg-brand-100 border border-brand-200 flex justify-between items-center transition-colors"><div class="font-bold text-sm text-brand-900">${t.name}<span class="block text-[10px] text-brand-500 font-normal mt-0.5">${t.date}</span></div><div class="font-black text-green-600">$${t.total}</div></div>`).join('')}
                    ${state.scrapTransactions.length===0?'<p class="text-center text-xs text-brand-400 py-4">No scrap history found.</p>':''}
                </div>
                <button onclick="state.modal=null; window.render()" class="mt-2 text-xs font-bold text-brand-400 uppercase tracking-widest hover:text-brand-800">Close</button>`;
            }
            else if (m.type === 'imageView') {
                content = `<img src="${m.src}" class="w-full h-auto rounded-xl object-contain max-h-[70vh]" />
                <button onclick="state.modal=null; window.render()" class="mt-4 w-full bg-brand-50 font-bold py-3 rounded-xl border border-brand-200 hover:bg-brand-100">Close Viewer</button>`;
            }
            else if (m.type === 'scrapReceipt') {
                const t = state.scrapTransactions.find(x => x.id === m.id);
                if(!t) { setTimeout(()=>{state.modal=null; window.render();},10); return ''; }
                content = `<div class="print-section text-left p-2 bg-white">
                    <div class="text-center mb-6"><h1 class="font-serif text-4xl italic text-brand-900">Gold and Rose</h1><h2 class="text-xs font-bold text-brand-500 uppercase tracking-widest mt-2">Scrap Buyback Receipt</h2></div>
                    <div class="space-y-4 text-sm text-brand-800 border-t border-brand-200 pt-5">
                        <p><strong>Date:</strong> ${t.date}</p><p><strong>Client:</strong> ${t.name}</p><p><strong>Phone:</strong> ${t.phone || 'N/A'}</p>
                        <div class="bg-brand-50 p-4 rounded-xl border border-brand-200 mt-4"><p class="text-xs font-bold uppercase mb-2 text-brand-500">Items Received:</p><p class="font-semibold">${t.summary}</p></div>
                        <div class="mt-6 text-center"><p class="text-xs font-bold uppercase text-brand-500 mb-1">Total Cash Payout</p><p class="text-4xl font-black text-green-600">$${t.total}</p></div>
                        ${t.image ? `<div class="mt-6"><p class="text-xs font-bold uppercase text-brand-500 mb-2">Reference ID:</p><img src="${t.image}" class="w-full max-w-[250px] rounded-xl border shadow-sm mx-auto" /></div>` : ''}
                    </div>
                </div>
                <div class="mt-6 flex gap-3 print-hide"><button onclick="window.print()" class="flex-1 bg-brand-800 text-brand-gold py-3.5 rounded-xl font-bold uppercase text-xs shadow-md">Print Receipt</button><button onclick="state.modal=null; window.render()" class="flex-1 bg-brand-50 border border-brand-200 text-brand-700 py-3.5 rounded-xl font-bold uppercase text-xs">Close</button></div>`;
            }
            else if (m.type === 'quoteReceipt') {
                const q = state.ringQuoteTransactions.find(x => x.id === m.id);
                if(!q) { setTimeout(()=>{state.modal=null; window.render();},10); return ''; }
                let d = q.fullData ? JSON.parse(JSON.stringify(q.fullData)) : getEmptyQuoteSession();
                
                content = `
                ${window.generateInvoiceTemplate(d, true)}
                <div class="mt-8 flex flex-col sm:flex-row gap-3 print-hide">
                    <button onclick="window.loadQuoteIntoEditor('${m.id}')" class="flex-1 bg-brand-100 text-brand-800 py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-brand-200">Load Editor</button>
                    <button onclick="window.generatePDF('pdf-modal-content', '${d.cName || 'Ledger'}')" class="flex-1 bg-brand-800 text-brand-gold py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-brand-900">Save PDF</button>
                    <button onclick="state.modal=null; window.render()" class="flex-1 bg-white border border-brand-200 text-brand-600 py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-brand-50">Close</button>
                </div>`;
            }
            else {
                content = `<p class="text-sm text-brand-500 mb-6">${m.message}</p>
                <div class="flex gap-3"><button onclick="state.modal=null; window.render()" class="flex-1 bg-brand-50 font-bold py-3 rounded-xl border border-brand-200 hover:bg-brand-100 transition-colors">Cancel</button>
                <button onclick="state.modal.onConfirm()" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-red-700 transition-colors">Confirm</button></div>`;
            }

            return `<div class="fixed inset-0 bg-brand-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                <div class="bg-white rounded-3xl p-6 w-full max-w-2xl shadow-2xl border border-brand-100 text-center relative max-h-[95vh] overflow-y-auto hide-scrollbar">
                    ${!['quoteReceipt', 'scrapReceipt', 'imageView'].includes(m.type) ? `<h3 class="font-serif text-2xl italic font-bold text-brand-900 mb-4">${m.title}</h3>` : ''}
                    ${content}
                </div>
            </div>`;
        }

        // --- GLOBAL BINDINGS ---
        window.fetchLivePrices = fetchLivePrices;
        window.calculateScrapTotal = calculateScrapTotal;
        window.updateScrapUI = updateScrapUI;
        window.calculateQuickRawCost = calculateQuickRawCost;
        window.updateSpotUI = updateSpotUI;
        window.saveScrapTransaction = saveScrapTransaction;
        window.applyScrapCredit = applyScrapCredit;
        window.editThumbnail = editThumbnail;
        window.handleSketchBgUpload = handleSketchBgUpload;
        window.updateTransformBox = updateTransformBox;
        window.handleTransformStart = handleTransformStart;
        window.handleTransformMove = handleTransformMove;
        window.handleTransformEnd = handleTransformEnd;
        window.setSketchTool = setSketchTool;
        window.setSketchColor = setSketchColor;
        window.setSketchThickness = setSketchThickness;
        window.startDrawing = startDrawing;
        window.draw = draw;
        window.stopDrawing = stopDrawing;
        window.clearSketch = clearSketch;
        window.saveSketch = saveSketch;
        window.viewImage = viewImage;
        window.updateQuoteTotals = updateQuoteTotals;
        window.saveRingQuote = saveRingQuote;
        window.loadQuoteIntoEditor = loadQuoteIntoEditor;
        window.saveSystemSettings = saveSystemSettings;
        window.initSignaturePad = initSignaturePad;
        window.generatePDF = generatePDF;
        window.exportCSV = exportCSV;
        window.clearHistory = clearHistory;
        window.handleImageUpload = handleImageUpload;
        window.showScrapDetails = showScrapDetails;
        window.showQuoteDetails = showQuoteDetails;
        window.openScrapLinkModal = openScrapLinkModal;
        window.deleteLedgerItem = deleteLedgerItem;
        window.confirmDeleteRing = confirmDeleteRing;
        window.toggleAdminMode = toggleAdminMode;
        window.saveSignature = saveSignature;
        window.clearSignature = clearSignature;
        window.buildInvoiceHTML = generateInvoiceTemplate;
        window.buildQuoteSummary = buildQuoteSummary;
        window.getTennisEstimates = getTennisEstimates;
        window.calculateRingCost = calculateRingCost;
        window.calculateRawCost = calculateRawCost;
        window.hasRingData = hasRingData;
        window.render = render;

        // --- BOOTSTRAP ---
        window.onload = () => { loadStorageData(); window.render(); };
    </script>
</body>
</html>
