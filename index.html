        };

        // --- STATE DEFINITIONS ---
        function genId() { return Math.random().toString(36).substr(2, 9); }
        
        function getEmptyRing(category) {
            const base = { id: genId(), category: category, material: 'gold', metalColor: 'Yellow', goldKarat: 14, fancy: [], melee: [], customAddon: '', customAddonDesc: '', ringNotes: '', discount: '', discountType: '$' };
            if(category === 'mensBand') return { ...base, mbSize: '', mbWidth: '', mbThickness: '', goldGrams: '' };
            if(category === 'pendant') return { ...base, pDimensions: '', goldGrams: '', centerStone: { carats: '', shape: 'Round', setting: 'Round Prongs' } };
            if(category === 'tennisBracelet') return { ...base, tbLength: 7.0, tbShape: 'Round', tbSizeRound: '2.0', tbSizeIdx: 0, tbManualStones: '', tbManualGrams: '', tbManualCarats: '' };
            return { ...base, goldGrams: '', cRingSize: '', cBandWidth: '', cBandThickness: '', centerStone: { carats: '', shape: 'Round', setting: 'Round Prongs' } };
        }

            const r1 = getEmptyRing('customRing'); r1.melee.push({ size: '1.3', carat: ROUND_MELEE['1.3'], qty: '' });
            return { id: genId(), cName: '', cPhone: '', cEmail: '', applyTax: false, notes: '', activeSubTab: r1.id, rings: [r1], scrapCredit: 0, signatureImg: null, referenceSketch: null, referencePhoto: null };
        }

        const state = {
            activeTab: 'quote', isAdminMode: false,

            scrapItems: [{ weight: '', material: 'gold', purity: 14, rate: 85 }], scrapImage: null,
            scrapTransactions: [], ringQuoteTransactions: [],
            lastUpdated: 'Manual Input', syncStatus: null,

            isSketching: false, editingImageType: 'sketch',

                meleePricePerCt: 2400, fancyPricePerCt: 700,

                tennisLaborRetail: 0, 
                tennisGoldPricesPerGram: { 10: 210, 14: 245, 18: 295, 19: 305, 22: 335 },

                tennisMeleePricePerCtRaw: 350, tennisFancyPricePerCtRaw: 420
            },
            quoteSession: getEmptyQuoteSession(),
            modal: null
        };

        // --- SYSTEM CORE ---
        function loadStorageData() {
            try {
                const st = safeJSONParse('gr_scrap_ledger', []); state.scrapTransactions = Array.isArray(st) ? st : [];
                const qt = safeJSONParse('gr_quote_ledger', []); state.ringQuoteTransactions = Array.isArray(qt) ? qt : [];
                const lsSettings = safeJSONParse('gr_master_settings', null);
                if (lsSettings) {
                    state.settings = { ...state.settings, ...lsSettings };
                    if(!state.settings.centerStones) state.settings.centerStones = { tier1: {price:1300}, tier2: {price:1200}, tier3: {price:1000} };
                    if(state.settings.tennisMeleePricePerCt === undefined) { 
                        state.settings.tennisMeleePricePerCt = 2600; state.settings.tennisFancyPricePerCt = 800;
                        state.settings.tennisLaborRetail = 0;
                        state.settings.tennisGoldPricesPerGram = { 10: 210, 14: 245, 18: 295, 19: 305, 22: 335 };
                        state.settings.tennisPlatinumPricePerGram = 400; state.settings.tennisSilverPricePerGram = 110;
                        state.settings.tennisMeleePricePerCtRaw = 350; state.settings.tennisFancyPricePerCtRaw = 420;
                    }
                }
                
                state.quoteSession.rings.forEach(r => { if(r.discount === undefined) r.discount = ''; });
            } catch (e) { console.warn("Storage Load Error Caught."); }
        }

        function toggleAdminMode() {
            state.isAdminMode = !state.isAdminMode;
            document.body.classList.toggle('admin-mode', state.isAdminMode);
            window.render();
        }

        // --- MATH ESTIMATORS ---
        function getTennisEstimates(r) {
            let stone_mm = 0; let caratPerStone = 0;
            if(r.tbShape === 'Round') { stone_mm = Number(r.tbSizeRound) || 2.0; caratPerStone = ROUND_MELEE[r.tbSizeRound] || 0.03; }
            else { 
                const activeFancy = FANCY_SHAPES[r.tbShape] || FANCY_SHAPES['Princess'];
                const fData = activeFancy[r.tbSizeIdx || 0] || activeFancy[0];
                stone_mm = parseFloat(fData.label) || 2.0; caratPerStone = fData.carat || 0.05; 
            }
            if(!stone_mm) return { estStones: 0, estGrams: 0, caratPerStone: 0 };
            
            const baseStones7 = Math.round(177.8 / (stone_mm + 0.4));
            const baseGrams7 = (stone_mm * 5) + 1;
            const lengthMult = Number(r.tbLength || 7.0) / 7.0;
            
            let densityMult = 1.0;
            if(r.material === 'gold') densityMult = (DENSITIES.gold[r.goldKarat] || 13.1) / 13.1;
            else if(r.material === 'platinum') densityMult = DENSITIES.platinum / 13.1;
            else if(r.material === 'silver') densityMult = DENSITIES.silver / 13.1;

            const estStones = Math.round(baseStones7 * lengthMult);
            const estGrams = (baseGrams7 * lengthMult * densityMult).toFixed(2);
            return { estStones, estGrams, caratPerStone };
        }

        function hasRingData(r) { return r && (Number(r.goldGrams)>0 || Number(r.centerStone?.carats)>0 || (r.fancy||[]).some(f=>Number(f.qty)>0) || (r.melee||[]).some(m=>Number(m.qty)>0) || Number(r.customAddon)>0 || Number(r.tbManualStones)>0); }

        function calculateRingCost(r) {
            if(!r) return 0;
            let costMetal = 0; const grams = Number(r.goldGrams) || 0;
            if(r.category === 'tennisBracelet') {
                if(r.material === 'gold') costMetal = grams * Number(state.settings.tennisGoldPricesPerGram[r.goldKarat] || 0);
                else if(r.material === 'platinum') costMetal = grams * Number(state.settings.tennisPlatinumPricePerGram);
                else if(r.material === 'silver') costMetal = grams * Number(state.settings.tennisSilverPricePerGram);
                
                const est = getTennisEstimates(r);
                const finalStones = Number(r.tbManualStones) || est.estStones;
                const finalCarats = Number(r.tbManualCarats) || (finalStones * est.caratPerStone);
                
                const pricePerCt = r.tbShape === 'Round' ? Number(state.settings.tennisMeleePricePerCt) : Number(state.settings.tennisFancyPricePerCt);
                const costStones = finalCarats * pricePerCt;
                const costLabor = finalStones * Number(state.settings.tennisLaborRetail || 0);
                return costStones + costMetal + costLabor + (Number(r.customAddon)||0);
            }
            if(r.material === 'gold') costMetal = grams * Number(state.settings.goldPricesPerGram[r.goldKarat] || 0);
            else if(r.material === 'platinum') costMetal = grams * Number(state.settings.platinumPricePerGram);
            else if(r.material === 'silver') costMetal = grams * Number(state.settings.silverPricePerGram);

            let meleeCts = 0; (r.melee || []).forEach(m => { meleeCts += (Number(m.qty)||0) * Number(m.carat); });
            const costMelee = meleeCts * Number(state.settings.meleePricePerCt);
            
            let costFancy = 0;
            (r.fancy || []).forEach(f => {
                const fData = (FANCY_SHAPES[f.shape] || [])[f.sizeIdx] || {carat:0};
                costFancy += (Number(f.qty)||0) * Number(fData.carat) * Number(state.settings.fancyPricePerCt);
            });
            
            let costCenter = 0;
            if ((r.category === 'customRing' || r.category === 'pendant') && r.centerStone?.carats) {
                const cts = Number(r.centerStone.carats);
                let mult = Number(state.settings.centerStones.tier3.price);
                if(cts < 2.0) mult = Number(state.settings.centerStones.tier1.price);
                else if(cts < 3.0) mult = Number(state.settings.centerStones.tier2.price);
                costCenter = cts * mult;
            }
            return costMelee + costFancy + costMetal + costCenter + (Number(r.customAddon)||0);
        }

        function calculateRawCost(r) {
            if(!r) return 0;
            const spot = Number(state.spotPrices[r.material]) / TROY_ONCE_GRAMS;
            const pf = r.material === 'gold' ? (Number(r.goldKarat)/24) : (r.material==='silver'?0.925:0.950);
            const rawMetal = (Number(r.goldGrams)||0) * spot * pf;

            if(r.category === 'tennisBracelet') {
                const est = getTennisEstimates(r);
                const finalStones = Number(r.tbManualStones) || est.estStones;
                const finalCarats = Number(r.tbManualCarats) || (finalStones * est.caratPerStone);
                const pricePerCtRaw = r.tbShape === 'Round' ? Number(state.settings.tennisMeleePricePerCtRaw || state.settings.rawCostRates.melee) : Number(state.settings.tennisFancyPricePerCtRaw || state.settings.rawCostRates.fancy);
                return (finalCarats * pricePerCtRaw) + rawMetal; 
            }

            let meleeCts = 0; (r.melee || []).forEach(m => { meleeCts += (Number(m.qty)||0) * Number(m.carat); });
            const rawMelee = meleeCts * Number(state.settings.rawCostRates.melee);
            
            let rawFancy = 0;
            (r.fancy || []).forEach(f => {
                const fData = (FANCY_SHAPES[f.shape] || [])[f.sizeIdx] || {carat:0};
                rawFancy += (Number(f.qty)||0) * Number(fData.carat) * Number(state.settings.rawCostRates.fancy);
            });
            
            const rawCenter = (r.category === 'customRing' || r.category === 'pendant') ? ((Number(r.centerStone?.carats)||0) * Number(state.settings.rawCostRates.center)) : 0;
            return rawMelee + rawFancy + rawCenter + rawMetal;
        }

        // --- SKETCHPAD METHODS ---
        let sketchCtx, isDrawing = false, bgImageObj = null;

        function editThumbnail(type) {
            state.editingImageType = type;
            const src = type === 'sketch' ? state.quoteSession.referenceSketch : state.quoteSession.referencePhoto;
            state.isSketching = true; window.render();
            setTimeout(() => {
                const canvas = document.getElementById('sketch-canvas'); const container = document.getElementById('sketch-container');
                if(!canvas || !container) return;
                canvas.width = container.clientWidth; canvas.height = container.clientHeight;
                sketchCtx = canvas.getContext('2d', { willReadFrequently: true }); sketchCtx.clearRect(0, 0, canvas.width, canvas.height); 
                bgImageObj = null;
                if(src) {
                    const img = new Image(); img.onload = () => {
                        bgImageObj = img; imgState.width = img.width; imgState.height = img.height;
                        imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;
                        imgState.x = (canvas.width - (img.width * imgState.scale)) / 2;
                        imgState.y = (canvas.height - (img.height * imgState.scale)) / 2;
                        imgState.rot = 0; window.updateTransformBox();
                    }; img.src = src;
                } else { window.updateTransformBox(); }
                window.setSketchTool('pen'); window.setSketchColor('#1e293b', 'slate'); window.setSketchThickness(3.0, 2);
                canvas.addEventListener('pointerdown', window.startDrawing); canvas.addEventListener('pointermove', window.draw);
                canvas.addEventListener('pointerup', window.stopDrawing); canvas.addEventListener('pointerout', window.stopDrawing);
                const tBox = document.getElementById('transform-box');
                if(tBox) { tBox.addEventListener('pointerdown', window.handleTransformStart); window.addEventListener('pointermove', window.handleTransformMove); window.addEventListener('pointerup', window.handleTransformEnd); }
            }, 50);
        }

        function handleSketchBgUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = function(event) {
                const img = new Image(); img.onload = function() {
                    bgImageObj = img; imgState.width = img.width; imgState.height = img.height;
                    const canvas = document.getElementById('sketch-canvas');
                    imgState.scale = Math.min(1, canvas.width / img.width, canvas.height / img.height) * 0.8;

        function calculateScrapTotal() {

                const spot = (state.spotPrices[item.material] || 0) / TROY_ONCE_GRAMS;
                const pf = item.material === 'gold' ? item.purity / 24 : item.purity;
                return total + (w * pf * spot * (r / 100));
            }, 0);
            return Math.max(0, gross - ((Number(state.stoneRemovalQty) || 0) * 5));
        }

                state.spotPrices.gold = res[0].price; state.spotPrices.silver = res[1].price; state.spotPrices.platinum = res[2].price;

                            const finalStones = Number(r.tbManualStones) || est.estStones;
                            const finalCarats = Number(r.tbManualCarats) || (finalStones * est.caratPerStone);
                            const tShape = r.tbShape==='Round' ? `${r.tbSizeRound}mm Round` : `${r.tbShape} (${(FANCY_SHAPES[r.tbShape]||[])[r.tbSizeIdx || 0]?.label || ''})`;
                            meleeText = `<p class="col-span-2"><strong class="text-brand-900">Bracelet Layout:</strong> ${finalStones}x ${tShape} (${finalCarats.toFixed(2)}ctw)</p>`;
                        }
                        
                        const centerText = ((r.category === 'customRing' || r.category === 'pendant') && Number(r.centerStone?.carats)>0) ? `<p class="col-span-2"><strong class="text-brand-900">Centerstone:</strong> ${r.centerStone.carats}ct ${r.centerStone.shape} (${r.centerStone.setting})</p>` : '';
                        const notesText = r.ringNotes ? `<p class="col-span-2"><strong class="text-brand-900">Design Notes:</strong> ${r.ringNotes}</p>` : '';
                        const addonText = r.customAddon ? `<p class="col-span-2"><strong class="text-brand-900">Addon Fee:</strong> $${r.customAddon} ${r.customAddonDesc ? `(${r.customAddonDesc})`:''}</p>` : '';
                        const metalLabel = r.material === 'gold' ? `${r.goldKarat}k ${r.metalColor} Gold` : (r.material==='silver'?'Silver':'Platinum');
                        
                        const rCost = window.calculateRingCost(r);
                        const dVal = Number(r.discount) || 0;
                        const rDiscountAmt = r.discountType === '%' ? rCost * (dVal / 100) : dVal;

                        return `
                        <div class="bg-brand-50 p-5 rounded-2xl border border-brand-200 relative mb-4 break-inside-avoid shadow-sm">
                            <div class="absolute top-4 right-5 text-right">
                                <span class="block font-black text-brand-900 text-lg">$${rCost.toFixed(2)}</span>
                                ${rDiscountAmt > 0 ? `<span class="block text-red-500 font-bold text-xs">-$${rDiscountAmt.toFixed(2)}</span>` : ''}
                            </div>
                            <h3 class="text-xs font-black uppercase tracking-wider text-brand-800 border-b border-brand-200 pb-2 mb-3 pr-28">${title} ${validRings.length>1?`(${i+1})`:''}</h3>
                            <div class="grid grid-cols-2 text-xs gap-y-2 text-brand-700">
                                <p><strong class="text-brand-900">Metal:</strong> ${r.goldGrams}g ${metalLabel}</p>
                                <p><strong class="text-brand-900">Specs:</strong> ${specs}</p>
                                ${centerText}
                                ${r.category!=='tennisBracelet'?fancyText:''}
                                ${meleeText}
                                ${notesText}
                                ${addonText}
                            </div>
                            ${isHistory ? '' : `
                            <div class="print-hide mt-4 flex items-center justify-end gap-2 border-t border-brand-200 pt-3">
                                <label class="text-[10px] font-bold text-brand-500 uppercase tracking-widest">Apply Discount:</label>
                                <div class="flex items-center bg-white border border-brand-200 rounded-lg overflow-hidden shadow-sm">
                                    <button onclick="state.quoteSession.rings['${globalIdx}'].discountType='$'; window.updateQuoteTotals(); window.render();" class="px-2 py-1.5 text-xs font-bold ${r.discountType==='$'?'bg-brand-100 text-brand-900':'text-brand-400'} transition-colors">$</button>
                                    <button onclick="state.quoteSession.rings['${globalIdx}'].discountType='%'; window.updateQuoteTotals(); window.render();" class="px-2 py-1.5 text-xs font-bold ${r.discountType==='%'?'bg-brand-100 text-brand-900':'text-brand-400'} transition-colors">%</button>
                                    <input type="number" class="w-16 p-1.5 text-xs font-bold text-red-600 text-right outline-none no-spinner" placeholder="0" value="${r.discount || ''}" oninput="state.quoteSession.rings['${globalIdx}'].discount=this.value; window.updateQuoteTotals();" />
                                </div>
                            </div>
                            `}
                        </div>`
                    }).join('')}

                    <div class="border-t-2 border-brand-800 pt-4 mt-6 text-sm text-brand-800 flex justify-end">
                        <div class="w-full md:w-1/2 space-y-2">
                            <div class="flex justify-between font-bold text-brand-600"><span>Gross Total:</span> <span>$${grandTotal.toFixed(2)}</span></div>
                            ${discountTotal > 0 ? `<div class="flex justify-between font-bold text-red-500"><span>Total Discounts:</span> <span>-$${discountTotal.toFixed(2)}</span></div>` : ''}
                            ${sq.scrapCredit > 0 ? `<div class="flex justify-between font-bold text-green-600"><span>Scrap Credit Applied:</span> <span>-$${sq.scrapCredit.toFixed(2)}</span></div>` : ''}
                            <div class="flex justify-between font-bold text-brand-600 border-t border-brand-200 pt-2"><span>Taxable Subtotal:</span> <span>$${subtotal.toFixed(2)}</span></div>
                            <div class="flex justify-between font-bold text-brand-600"><span>Tax ${sq.applyTax ? '(12% BC)' : '(Exempt)'}:</span> <span>$${taxAmount.toFixed(2)}</span></div>
                            <div class="flex justify-between font-black text-2xl text-brand-900 border-t-2 border-brand-800 pt-2 mt-2"><span>Grand Total:</span> <span>$${finalAmount.toFixed(2)}</span></div>
                        </div>
                    </div>
                    
                    <div class="admin-only bg-green-50 text-green-700 border border-green-200 p-4 rounded-xl mt-6 text-xs font-mono shadow-inner">
                        <strong class="uppercase tracking-widest block border-b border-green-200 pb-2 mb-2 text-[10px]">Internal Admin Cost Breakdown</strong>
                        Total Raw Material Cost: $${rawTotal.toFixed(2)}<br>
                        Implied Gross Profit: $${(finalAmount - rawTotal).toFixed(2)}
                    </div>

                    <div class="mt-8 break-inside-avoid">
                        <h4 class="text-[10px] font-bold uppercase text-brand-700 mb-3 tracking-widest">Additional Notes</h4>
                        <textarea class="w-full h-32 p-4 bg-brand-50 border border-brand-200 rounded-xl text-sm text-brand-800 focus:bg-white transition-colors outline-none resize-none shadow-sm overflow-hidden print-hide" placeholder="Enter manual notes, special instructions, or terms here..." ${isHistory ? 'readonly' : `oninput="if('${targetId}'==='pdf-content'){ state.quoteSession.notes=this.value; }"`}>${sq.notes || ''}</textarea>
                        <div class="hidden print:block text-sm text-brand-800 whitespace-pre-wrap leading-relaxed">${sq.notes || ''}</div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-brand-200 break-inside-avoid">
                        <h4 class="text-[10px] font-bold uppercase tracking-widest text-brand-700 mb-3">Client Authorization</h4>
                        ${sq.signatureImg ? `
                            <img src="${sq.signatureImg}" class="h-20 w-auto mb-1 border-b border-brand-300" />
                            <p class="text-[9px] uppercase text-brand-500 tracking-widest">Signed digitally</p>
                            ${isHistory ? '' : `<button onclick="window.clearSignature()" class="text-[9px] text-red-500 mt-2 hover:underline print-hide">Clear Signature</button>`}
                        ` : (isHistory ? `
                            <p class="text-[9px] text-brand-400 mt-2 uppercase tracking-widest">No Signature Captured</p>
                        ` : `
                            <canvas id="signature-pad" class="w-full h-24 border-2 border-dashed border-brand-300 rounded-xl bg-brand-50 cursor-crosshair print-hide"></canvas>
                            <p class="text-[9px] text-brand-400 mt-2 text-center print-hide uppercase tracking-widest">Draw signature above</p>
                            <button onclick="window.saveSignature()" class="mt-2 bg-brand-800 text-brand-gold px-4 py-2 rounded-lg text-xs font-bold print-hide shadow-sm hover:bg-brand-900 transition-colors w-full md:w-auto">Lock Signature</button>
                        `)}
                    </div>
                    
                    <div class="mt-8 text-[8px] text-brand-500 italic text-justify leading-relaxed space-y-1 bg-brand-50 p-4 rounded-xl border border-brand-100">
                        <p>* This quotation is valid for 7 days from the date of issue. Fluctuations in global precious metal markets may result in minor pricing adjustments prior to casting.</p>
                        <p>* All custom orders require a 50% non-refundable deposit before CAD rendering or manufacturing begins.</p>
                        <p>* Minor design adjustments during the rendering phase are accommodated free of charge for clients producing a piece with us. However, complete redesigns will incur a design fee.</p>
                        <p>* <strong>Please note:</strong> Once a design has been approved and cast into metal, any subsequent alterations will incur additional charges to cover refining fees, labor, and new alloy costs.</p>
                    </div>
                </div>
            `;
        }

        // --- EXPORT & DATA OPS ---
        function exportCSV(type) {
            let csv = "";
            if (type === 'scrap') {
                csv = "Date,Client,Phone,Summary,Total\n";
                (state.scrapTransactions || []).forEach(t => { if(t) csv += `"${t.date || ''}","${t.name || ''}","${t.phone || ''}","${(t.summary||'').replace(/"/g, '""')}","${t.total || 0}"\n`; });
            } else {
                csv = "Date,Client,Phone,Total Price\n"; 
                (state.ringQuoteTransactions || []).forEach(q => { if(q) csv += `"${q.date || ''}","${q.name || ''}","${q.phone || ''}","${q.total || 0}"\n`; });
            }
            const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${type}_Ledger_Export_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function clearHistory() {
            const range = document.getElementById('clear-history-range').value;
            const startDateEl = document.getElementById('clear-start-date').value; const endDateEl = document.getElementById('clear-end-date').value;
            if (!confirm("WARNING: Are you sure you want to delete ledger history? Ensure you have exported a backup first!")) return;

            let fS = [], fQ = [];
            const safeS = Array.isArray(state.scrapTransactions) ? state.scrapTransactions : [];
            const safeQ = Array.isArray(state.ringQuoteTransactions) ? state.ringQuoteTransactions : [];

            if (range === 'all') { fS = []; fQ = []; } 
            else if (range === '365') {
                const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 365);
                fS = safeS.filter(t => t && new Date(t.date) > cutoff); fQ = safeQ.filter(t => t && new Date(t.date) > cutoff);
            } else if (range === 'custom') {
                if (!startDateEl || !endDateEl) return alert("Select start and end dates.");
                const start = new Date(startDateEl); start.setHours(0,0,0,0); const end = new Date(endDateEl); end.setHours(23,59,59,999);
                fS = safeS.filter(t => { if(!t) return false; const d = new Date(t.date); return d < start || d > end; });
                fQ = safeQ.filter(t => { if(!t) return false; const d = new Date(t.date); return d < start || d > end; });
            }
            state.scrapTransactions = fS; state.ringQuoteTransactions = fQ;
            localStorage.setItem('gr_scrap_ledger', JSON.stringify(fS)); localStorage.setItem('gr_quote_ledger', JSON.stringify(fQ));
            render(); alert("Ledger records purged.");
        }

        function handleImageUpload(e, key) {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader(); r.onload = ev => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const max = 800; let w=img.width, h=img.height;
                    if(w>max){h*=(max/w); w=max;} canvas.width=w; canvas.height=h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    if(key==='scrap') state.scrapImage = canvas.toDataURL('image/jpeg', 0.6);
                    else state.quoteSession.referencePhoto = canvas.toDataURL('image/jpeg', 0.6);
                    render();
                }; img.src = ev.target.result;
            }; r.readAsDataURL(file);
        }

        function showScrapDetails(id) { state.modal = { type: 'scrapReceipt', id: id }; render(); }
        function showQuoteDetails(id) { state.modal = { type: 'quoteReceipt', id: id }; render(); }
        function openScrapLinkModal() { state.modal = { type: 'scrapLink', title: 'Apply Scrap Credit' }; render(); }
        function deleteLedgerItem(type, id) {
            state.modal = {
                title: 'Confirm Deletion', message: 'Permanently delete this record from the history ledger database?',
                onConfirm: () => {
                    if(type === 'scrap') { state.scrapTransactions = state.scrapTransactions.filter(t => t.id !== id); localStorage.setItem('gr_scrap_ledger', JSON.stringify(state.scrapTransactions)); }
                    else { state.ringQuoteTransactions = state.ringQuoteTransactions.filter(q => q.id !== id); localStorage.setItem('gr_quote_ledger', JSON.stringify(state.ringQuoteTransactions)); }
                    state.modal = null; render();
                }
            }; render();
        }

        // --- RENDER ROUTER ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="flex flex-col items-center mb-6 pt-4 relative">
                    ${(state.activeTab === 'quote' || state.activeTab === 'settings') ? 
                        `<div class="absolute right-0 top-0"><button onclick="window.toggleAdminMode()" class="px-4 py-1.5 rounded-xl text-[10px] font-bold uppercase tracking-widest border transition-colors ${state.isAdminMode ? 'bg-yellow-600 text-white border-yellow-700 shadow-md' : 'bg-white text-brand-400 border-brand-200'}">Admin Mode: ${state.isAdminMode?'ON':'OFF'}</button></div>` : ''
                    }
                    <h1 class="font-serif text-5xl italic text-brand-900 tracking-wide drop-shadow-sm">Gold and Rose</h1>
                    <p class="text-[10px] text-brand-400 uppercase tracking-[0.3em] font-bold mt-3">Executive Operations Dashboard</p>
                </div>
                
                <div class="flex border-b border-brand-200 mb-6 bg-white rounded-t-2xl px-4 pt-4 shadow-sm overflow-x-auto hide-scrollbar">
                    ${[{id:'scrap_calculator', label:'Scrap Calculator'}, {id:'quote', label:'Custom Quote'}, {id:'spot_price', label:'Spot Price'}, {id:'settings', label:'Settings'}, {id:'ledger', label:'Ledger History'}].map(t => 
                        `<button onclick="state.activeTab='${t.id}'; window.render()" class="py-3 px-5 font-bold text-sm md:text-base whitespace-nowrap border-b-4 transition-colors ${state.activeTab === t.id ? 'bg-brand-50 text-brand-900 border-brand-800' : 'border-transparent text-brand-500 hover:text-brand-700'}">${t.label}</button>`
                    ).join('')}
                </div>

                <div class="animate-fadeIn">
                    ${state.activeTab === 'scrap_calculator' ? buildScrapHTML() : ''}
                    ${state.activeTab === 'quote' ? buildQuoteTab() : ''}
                    ${state.activeTab === 'spot_price' ? buildSpotHTML() : ''}
                    ${state.activeTab === 'settings' ? buildSettingsHTML() : ''}
                    ${state.activeTab === 'ledger' ? buildLedgerHTML() : ''}
                </div>
                ${buildModals()}
                
                ${state.isSketching ? `
                    <div class="fixed inset-0 bg-brand-100 z-[100] flex flex-col animate-fadeIn">
                        <div class="flex justify-between items-center p-4 bg-brand-900 text-white shadow-md z-10 border-b border-brand-800">
                            <h3 class="font-bold tracking-widest uppercase text-sm text-brand-gold">Design Sketchpad</h3>
                            <div class="flex gap-3 items-center">
                                <button onclick="window.clearSketch()" class="text-xs text-red-400 font-bold hover:text-red-300 px-3">Clear</button>
                                <button onclick="state.isSketching=false; window.render()" class="text-xs text-brand-300 font-bold hover:text-white px-3 border-r border-brand-700 pr-5">Cancel</button>
                                <button onclick="window.saveSketch()" class="text-xs bg-brand-gold text-brand-900 hover:bg-brand-goldHover px-5 py-2 rounded-lg font-black transition-all shadow-sm">Save</button>
                            </div>
                        </div>
                        <div class="flex-1 relative overflow-hidden bg-white cursor-crosshair" id="sketch-container">
                            <img id="sketch-bg" style="display: none; position: absolute; pointer-events: none;" />
                            <div id="transform-box"><div id="handle-rotate" class="transform-handle">${ICONS.rotate}</div><div id="handle-scale" class="transform-handle">${ICONS.scale}</div></div>
                            <canvas id="sketch-canvas" class="absolute inset-0 w-full h-full touch-none"></canvas>
                        </div>
                        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-4 py-3 rounded-2xl shadow-2xl border border-brand-200 flex flex-wrap justify-center gap-4 sm:gap-6 items-center z-20 w-[90%] sm:w-auto">
                            <div class="flex gap-2 border-r pr-4 sm:pr-6 border-brand-200 text-brand-500">
                                <button id="tool-pen" onclick="window.setSketchTool('pen')" class="p-2.5 bg-brand-gold/10 text-brand-gold rounded-xl shadow-inner border-2 border-brand-gold transition-all" title="Pen">${ICONS.pen}</button>
                                <button id="tool-highlighter" onclick="window.setSketchTool('highlighter')" class="p-2.5 bg-transparent hover:bg-brand-50 rounded-xl border-2 border-transparent transition-all" title="Highlight">${ICONS.highlighter}</button>
                                <button id="tool-eraser" onclick="window.setSketchTool('eraser')" class="p-2.5 bg-transparent hover:bg-brand-50 rounded-xl border-2 border-transparent transition-all" title="Eraser">${ICONS.eraser}</button>
                                <button id="tool-transform" onclick="window.setSketchTool('transform')" class="p-2.5 bg-transparent hover:bg-brand-50 rounded-xl border-2 border-transparent transition-all" title="Move">${ICONS.transform}</button>
                            </div>
                            <div class="flex flex-col gap-1 border-r pr-4 sm:pr-6 border-brand-200 items-center justify-center min-w-[80px]">
                                <label class="cursor-pointer text-[10px] font-bold text-brand-700 bg-brand-100 px-3 py-1.5 rounded-lg hover:bg-brand-200 transition-all text-center flex items-center gap-1.5 shadow-sm">${ICONS.camera} Photo<input type="file" accept="image/*" class="hidden" onchange="window.handleSketchBgUpload(event)" /></label>
                            </div>
                            <div class="flex gap-2 sm:gap-3 border-r pr-4 sm:pr-6 border-brand-200">
                                <button id="color-slate" onclick="window.setSketchColor('#1e293b', 'slate')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-brand-800 border-2 border-brand-400 shadow-md scale-110 transition-all"></button>
                                <button id="color-gold" onclick="window.setSketchColor('#d4af37', 'gold')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-brand-gold border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                                <button id="color-red" onclick="window.setSketchColor('#dc2626', 'red')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-red-600 border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                                <button id="color-green" onclick="window.setSketchColor('#16a34a', 'green')" class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-green-600 border-2 border-transparent shadow-sm scale-100 transition-all"></button>
                            </div>
                            <div class="flex gap-3 sm:gap-4 items-center pl-2">
                                <button id="thick-1" onclick="window.setSketchThickness(1.5, 1)" class="w-3.5 h-3.5 bg-brand-300 rounded-full hover:bg-brand-500 transition-all"></button>
                                <button id="thick-2" onclick="window.setSketchThickness(3.0, 2)" class="w-5 h-5 bg-brand-gold rounded-full shadow-md transition-all"></button>
                                <button id="thick-3" onclick="window.setSketchThickness(6.0, 3)" class="w-7 h-7 bg-brand-300 rounded-full hover:bg-brand-500 transition-all"></button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
            if(state.activeTab === 'quote' && state.quoteSession.activeSubTab === 'summary') setTimeout(window.initSignaturePad, 100);
            if(state.activeTab === 'quote' || state.activeTab === 'settings' || state.activeTab === 'spot_price' || state.activeTab === 'scrap_calculator') setTimeout(window.updateQuoteTotals, 0);
        }

        // --- GLOBAL BINDINGS ---
        window.fetchLivePrices = fetchLivePrices;
        window.calculateScrapTotal = calculateScrapTotal;
        window.updateScrapUI = updateScrapUI;
        window.calculateQuickRawCost = calculateQuickRawCost;
        window.updateSpotUI = updateSpotUI;
        window.saveScrapTransaction = saveScrapTransaction;
        window.applyScrapCredit = applyScrapCredit;
        window.editThumbnail = editThumbnail;
        window.handleSketchBgUpload = handleSketchBgUpload;
        window.updateTransformBox = updateTransformBox;
        window.handleTransformStart = handleTransformStart;
        window.handleTransformMove = handleTransformMove;
        window.handleTransformEnd = handleTransformEnd;
        window.setSketchTool = setSketchTool;
        window.setSketchColor = setSketchColor;
        window.setSketchThickness = setSketchThickness;
        window.startDrawing = startDrawing;
        window.draw = draw;
        window.stopDrawing = stopDrawing;
        window.clearSketch = clearSketch;
        window.saveSketch = saveSketch;
        window.viewImage = viewImage;
        window.updateQuoteTotals = updateQuoteTotals;
        window.saveRingQuote = saveRingQuote;
        window.loadQuoteIntoEditor = loadQuoteIntoEditor;
        window.saveSystemSettings = saveSystemSettings;
        window.initSignaturePad = initSignaturePad;
        window.generatePDF = generatePDF;
        window.exportCSV = exportCSV;
        window.clearHistory = clearHistory;
        window.handleImageUpload = handleImageUpload;
        window.showScrapDetails = showScrapDetails;
        window.showQuoteDetails = showQuoteDetails;
        window.openScrapLinkModal = openScrapLinkModal;
        window.deleteLedgerItem = deleteLedgerItem;
        window.confirmDeleteRing = confirmDeleteRing;
        window.toggleAdminMode = toggleAdminMode;
        window.saveSignature = saveSignature;
        window.clearSignature = clearSignature;
        window.buildInvoiceHTML = buildInvoiceHTML;
        window.getTennisEstimates = getTennisEstimates;
        window.calculateRingCost = calculateRingCost;
        window.calculateRawCost = calculateRawCost;
        window.hasRingData = hasRingData;
        window.render = render;

        // --- BOOTSTRAP ---
        window.onload = () => { loadStorageData(); window.render(); };
    </script>
</body>
</html>
